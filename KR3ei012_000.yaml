body:
  text: 脈法經曰婦人手少陰動甚者妊子也又曰陰搏陽別謂之有子寸洪而尺大又尺中之脈按之不絶者妊娠也按婦人帶證足少陰脈亦多滑利頗似孕脈然必與手少陰脈動相應方為妊子否則為帶也凡婦人懷孕其血留氣聚胞宮內實故尺陰之脈必滑數此必然之理也然亦有中年受胎及血氣羸弱之婦脈見細小不數者但於微弱之中必有隱隱滑動之象此即陰搏陽別之謂乃妊娠之脈也但胎孕之脈數勞損之脈亦數然損脈數中兼弦澀胎孕數必兼和滑此幾證中邪氣胃氣之異一診便知再加審之以證則顯然而明見者也血衰氣旺定無妊血旺氣衰應有嗣婦人經脈不見行其脈微滑帶數意身雖有病脈無邪不澀不伏不弦徑寸微關滑尺數形流動往來雀啄利兩手關脈大相應胎已有形無差異右尺左寸滑見形症別一男又一女又云左寸浮大男右寸沉細稱為女滑疾按散三月胎但疾不散五月母八九十月疾數無亦有始終洪數婦胎脈弦牢滑利安沉細而微歸泉路若脈沉細腹微疼雖有形如懷抱甕腹滿不動是為奇獨冷臍下翕翕動更兼早暮尺不同大小浮沉無定論或動或止或有無此是鬼胎脈現症連診數日皆如此補氣活血何須問女子二七天癸至調經察脈要分明兩手尺脈皆沉伏此病分明是閉經肝大肺小應有子兩尺不斷滑方真心腎俱旺知是孕肺大肝小孕不成左寸滑實為男脈右尺沉滑女現形肝肺俱浮胸膈痛兩關沉緊腹中疼一月一行為經信或前或後要留心先期而行為血熱後期而至是寒經經來疼痛為氣滯行後而痛氣之虛其色黑者多實熱淡白而來痰所凝煙塵黃水血不足紫色由來風邪侵行經之時宜慎重若有憂鬱血必停走於腰膝多疼痛散在四肢則不仁停於血海生寒熱逆上衝心患戰驚此是調經真妙訣醫人熟記信有靈婦人尺中脈滑女經不調且有帶淋之症關中脈澀天癸已斷寧非鬱塞之疴左寸滑而左尺大懷子之兆左尺數而左關微有兒之徵左寸帶縱兩男之祥右寸帶縱雙女之喜左關左尺脈皆大心脈流利必三男右關右尺脈皆大心脈流利必三女然三部有一部之滯未宜遽許為胎各脈無一脈之順何敢輕言是孕子死母存尺浮而寸沉母亡子活尺澀而寸伏蓋子繫於腎尺浮則子無生氣母系於肺寸沉則母有生機子繫於尺尺澀而子之氣不散母系於寸寸伏而母之根已離沉細之脈胎欲離經浮滑之脈胎將即産腹疼腰痛定然作降漿來胞破未可言生身重體寒面又青脈無可畏心煩血燥舌兼黑脈斷堪憂子母難留唇口沫出娘兒全活面白顏黃新産脈緩自存胃氣新産脈滑未損脾陰實大既形定非佳兆弦急兼現豈是祥沉小實為順候澀促半作返觀脈微何足害尚可回陽脈洪反宜愁最嫌逆冷欲知有妊尺中滑疾左尺沉實男子脈形右尺浮大女脈是實左右俱滑定生兩男左右俱浮二女脈真左尺偏大為男右尺偏大為女大者如突狀又左尺浮大者為男右尺沉細者為女若脈來斷續虛弱者月水不利也妊娠脈其人能食身無苦容飾如常是妊定孕真帶嘔頭昏悶此時停痰惡阻病急宜正胃與消痰固血安胎全兩命若還腰腹俱疼痛日夜咽乾潮熱盛多眠惡食倦昏沉此屬經凝卻非妊行經三忌一行經感冒風寒不宜發汗又不宜速用發散藥必俟經血行盡方可服解表退熱之劑如羌活麻黃桂枝防風細辛之類一行經之時不亦多浴冷水恐患四肢麻痹又不宜多飲冷水恐傷肺氣必患聲啞咳嗽無藥救治一行經不宜飲酒恐引血妄行四肢又不宜鬱怒太甚恐經血必停變成閉經又不宜驟用補藥恐致蓄血或四肢疼痛或五心寒熱調經奇方歸身錢半酒洗陳皮七分真川芎八分白芍一錢酒炒大熟地錢半丹皮七分延胡七分醋炒吳萸滾水泡去黑水去蒂梗酒炒二分香附米錢半酒炒白茯苓八分經行先期三五日色紫者加條芩酒炒一錢五分經行過期色淡者加官桂五分炮熟黑薑五分艾葉醋炒五分引用生薑一片水一碗煎至八分空心溫服渣再煎臨臥服此藥俟經行時服起連用四劑到次月經再行時再服四劑往後對月可坐喜生男矣調經主方當歸三錢川芎二錢白芍酒炒二錢酒蒸地黃三錢甘草四制香附陳皮各一錢生薑二片先期而來血熱也本方加酒炒黃芩酒炒柴胡丹皮各一錢後期而至血虛也本方加蜜炙黃耆土炒白朮白茯苓杜仲故紙各一錢經來痛甚氣滯也本方加桃仁靈芝紅花元胡各一錢經來痛甚有痞塊加三稜莪朮山楂核俱用酒炒各一錢經行作痛用八珍湯加吳萸故紙小茴各一錢血淡不紅者痰也本方加半夏南星白朮肉桂各一錢經來多黑塊實熱也本方加酒炒黃連五分紅花丹參各一錢經來多黃水血不足也加白苓黃耆肉桂人參白朮各一錢經來手足痠痛加桂枝防風秦艽各一錢經來卒倒仆地脈散腮紅火熱肝也不可認作中風中痰本方加膽草桃紅柴胡黃芩各一錢經水一月再行經水一月再來行多因怒氣損肝經四物湯內加柴芩川連增入更為靈另加知柏為丸服滋陰降火治衝任脈與症無火而經早不及期者乃心脾氣虛不能固攝而然宜服八珍湯加杜仲續斷五味子切不可作火治一月二三至或半月或旬日或二十日此血氣敗亂之症當大補氣血不得以經早同治宜服十全大補湯一血熱經遲由婦人陰火內爍血本熱而亦每過期者此水虧血少燥澀而然何以驗之其經來必多紫黑腹兼微痛宜服滋陰八味丸合四物湯一血寒經遲陽氣不足生化失期故過月也何以驗之其經來色多不鮮或澀滯而少惡寒喜暖脈多微沉此無火之症宜服理陰扶陽四物湯當歸二錢川芎錢半白芍酒炒一錢熟地二錢黑薑錢半肉桂一錢吳萸六分蓽茇五分經閉不行三候一則脾胃有損傷食少血虧非血停急宜補脾還養血血充氣足經自行一則憂怒損肝經肝火鬱閉經始停開鬱二陳湯急用四制女聖丸亦靈一則體肥痰滯壅故令經血不能通加減導痰湯作主多服方知藥有功未嫁愆期經忽閉急宜婚嫁自然通經閉飽脹腹痛經閉飽脹有主方皆用通經活血湯丹皮荊芥川牛膝赤芍歸芎生地黃桃仁肉桂與紅花澤蘭枳殼生蒲黃閉久憂中成痞塊更加莪朮與檳榔崩症三候血崩之症分五名赤者汁如洗絳形黃如爛瓜流黃水白猶鼻涕不留停青則恰如青靛色黑乃紫黑血塊凝血未來時先發熱此因肝火內相浸清肝涼血有主方加味逍遙實可尋血虛氣弱血來崩歸脾湯吃倍為靈白崩之症另有方八珍加減不須驚絳色肝火也黃色脾之濕熱也白色氣虛也紅色肝氣盛也黑色肝脾實熱一血來小腹微痛歸脾加小茴吳萸各七七一婦人行經三日前骨中發熱下血如崩豫用加味逍遙散加知母黃柏每月服七八劑三月全愈因素有憂鬱而致一婦人年逾四十患崩症白多紅少豫用歸脾湯去木香加阿膠續斷淡吳萸熟地瓦炙乾杜仲故紙鹽水炒十劑而愈赤白帶下帶下者由濕痰流注於帶脈而下濁液故曰帶下婦人多有之赤者屬熱兼虛兼火治之白者屬濕兼虛兼痰治之年久不止補脾腎兼升提大抵瘦人多火肥人多痰最要分辨白帶白濁白淫三種三者相似而迥然各別白帶者時常流出清冷稠黏此下元虛損也白濁者濁隨小便而來渾濁如泔此胃中濁氣滲入膀胱也白淫者常在小便之後而來亦不多此男精不攝滑而自出也崩漏帶下危症一崩帶日久純下臭黃水或帶紫黑筋塊腥穢不堪者不治一崩帶腹滿不能飲食不受參術補益者不治一崩帶服大補劑後反加寒熱口燥面目足脛浮腫者不治一崩帶已止少腹不疼後變陰戶腫脹痛如刀割者死期迫矣治婦人赤白帶下此丸神良此症須當壯脾胃升陽氣為主馬毛二兩椒和伏火一宿白馬毛治白帶赤馬毛治赤帶龜甲四兩醋炙鱉甲二兩醋炙牡蠣二兩火炙為末醋水跌丸如梧桐子大每服三錢溫酒送下日三服為散尤妙氣陷於下焦則白帶血陷於下焦則赤帶以澀藥止之則未盡之帶留而不出以利藥下之則既損之中又傷其下皆非治也馬得乾之剛毛得血之餘血餘可以固血乾剛可以利氣固血則赤止利氣則自愈此用馬毛之意也龜鱉牡蠣外剛而內柔離之象也去其柔而用其剛故可以化症可以固氣化症則赤白之成帶者無復中留固氣則榮衛之行不復下陷營不陷則無赤衛不陷則無白矣惡阻論惡阻者謂有胎氣噁心阻其飲食也妊娠稟受怯弱中脘宿有痰飲便有阻病其症顏色如故脈息平和但覺多臥少起肢體沉重頭目昏眩惡聞食氣喜啖酸鹹或嗜一物或大吐或時吐痰與清水甚者或作寒熱心中憒悶嘔吐痰水胸膈煩滿恍惚不能支持此皆胃氣弱而兼痰與氣滯者也亦有素本不虛而一受胎孕則衝任上壅氣不下行故嘔逆者又有由經血既閉水漬於臟臟氣不宣通故心煩憒悶氣逆而嘔吐及三月餘而嘔吐漸止蓋三月相火化胎之候未能上食於母血氣未用五味不化中氣壅實其為鬱滯痰火穢惡之氣盡衝於胃所以有惡阻等症以上諸症輕者不須服藥乃常病也重者須少藥調之宜用加味參橘飲惡阻兼腰痛者防胎墜下猶宜二陳四物加條芩白朮和中理脾為主不可升舉蓋嘔逆氣已上升再用升藥則犯有升無降上更實而下更虛益促其墜矣再若左脈弱而嘔服諸藥不止者當服理血歸原藥則愈經云無陰則嘔是也加味參橘飲治孕成二三月後惡阻嘔逆惡食或頭眩暈倦怠者人參一錢歸身酒洗白朮各二錢土炒半夏八分制橘紅藿香炙草各四分砂仁三分碎竹茹歸原散治妊娠惡阻嘔吐不止頭痛全不入食服諸藥不愈者人參川芎歸身白芍丁香炙草各五分茯苓白朮土炒陳皮各一兩五錢半夏一兩制桔梗炒枳殼麩炒各二錢半共為細末引用薑五片棗一枚每服三錢方內丁香不若易以砂仁或豆蔻為穩如果胃寒之甚用者亦詳慎之胞漏並小産論凡妊娠經水壅之以養胎蓄之以為乳其衝任氣虛不能約制故月水時下名曰胞漏血儘子死然亦有妊娠血盛月信常來而胎不動俗呼狗兒胎也若以漏胎治之則胎必墜若不以漏胎治之其胎未必墜亦有脈見滑數而別無風熱病經脈如常但較前略少此因胎小血盛有餘而然俟遲至三四月外兒大能飲經脈自止又有壯盛孕婦按月去血點滴若無腰痠胎動不須服藥此血氣強盛孕至四五月後自然經止如孕婦虛羸腰常痠痛並胎動而按月下血點滴或下血不止此非血有餘乃胎漏也宜服加味補中安胎飲又云胎漏多因於血熱然亦有氣虛血少服涼藥而下血益甚食少體倦者此脾氣虛而不能攝血也宜歸脾等方加減當以脈候察之凡墜胎之病多在三五七月如前次三月會墜後必如期乘其所虛而亦墜必預服尊生安胎飲或胎元飲加減用之當服過七月可無患矣更宜戒房欲氣惱勞役煿炙諸食至於頓僕傷動胎氣宜服膠艾安胎散總屬妊娠氣血虛弱胎元不固蓋氣虛則提攝不固血弱則灌溉不周多致小産況婦人腎以系胞而腰為腎之腑腰痛則墜不可不防大凡妊娠三月後尺脈或澀或微弱胎必不固惟脈洪盛者胎不墜耳所以脈訣內云胎脈弦牢滑利安沉細而微歸泉路正此之謂也總之三月以前宜養脾胃四月以後宜壯腰腎補血順氣佐以清熱此大法也加味補中安胎飲人參一錢白朮土炒當歸各二錢酒洗川芎黃芩各八分紫蘇陳皮砂仁碎炙草各四分尊生安胎飲亦治胎動胎漏歸身酒洗白芍酒炒熟地生地砂仁阿膠各一錢炒珠杜仲鹽水炒去絲白朮各二錢土炒條芩一錢五分續斷肉八分酒製川芎陳皮蘇梗各五分景嶽胎元飲治婦人衝任失守胎元不安不固或間日或二三日服一二劑人參隨宜當歸酒洗杜仲鹽水炒斷絲白芍各二錢酒炒熟地二三錢白朮一錢半土炒陳皮七分無滯者不必用炙草一錢水二鍾煎七分食遠服如下元不固而多遺濁者加炒山藥炒補骨脂五味之類氣分虛甚者倍白朮加灸黃耆但耆術氣浮能滯胃口倘胸膈有飽悶不快者須慎用之如虛而兼寒多嘔者加炮薑七八分或一二錢如虛而兼熱者加酒炒黃芩一錢半或加生地二錢去杜仲如陰虛小腹作痛加枸杞二錢如有所觸而動血者加制續斷肉炒阿膠各一二錢諸痛論妊娠心腹痛或宿有冷痞痰飲結聚或新觸風寒邪正相擊若胸腹膨滿按之而痛乃飲食停滯用人參養胃湯按之不痛乃脾胃受傷以六君補之腹中滿痛叉心不得飲食千金芩術芍藥湯如不時腹痛名曰胎痛有血虛有氣滯二因然血虛居多用熟地三錢當歸一錢煎湯治之不應加參朮陳皮丹溪用四物去川芎倍加熟地若氣滯者紫蘇飲治之若痛而重墜因中氣虛陷用補中益氣湯如胃口痛多因脾虛存食不消宜養胃消食綱目用平胃散加枳殼山楂豫謂平胃散恐致損胎非所宜也宜養胃湯加減妊娠脅痛有因哭泣因內傷因惱怒不宜破氣宜用童便和酒服之或紫蘇飲去參用白芍當歸加砂仁童便妊娠臍下冷痛腹脹虛疼小便頻數大便虛滑皆食生冷所致小建中加炮薑木香不應更加茴香良薑妊娠少腹痛虛熱紫蘇飲虛寒膠艾湯若小腹近下處腫脹浮薄發光者孕癰也千金托裡散或薏苡仁煎汁飲若心腹急痛煩悶面青冷汗氣絶血下不止其胎上衝者不可治也妊娠腰痛有腎虛作痛則脈大而痛不已急服八珍加膠艾黃耆或紫蘇飲加減有勞力任重致傷胞系欲脫宜安胎飲加杜續有房事不節致傷胞系用熟地當歸阿膠砂仁竹茹炙草調男子褲襠灰一錢禁房事百日要緊有濕熱脈緩遇天陰或久坐而痛多下白物二妙散加柴胡防風茯苓半夏有寒濕腰重如帶物而冷者用紫蘇飲加減易健脾溫燥藥有氣血凝滯脈澀而日輕夜重不得臥遍身拘急不舒而痛眼生黑花紫蘇飲加枳殼桔梗有悶銼脈實膠艾芎歸湯或佛手散或熬枯黑糖沖童便酒調服有走注痛敗血入經之症四烏湯加薄桂杜續妊娠背脊痛氣滯也紫蘇飲治之妊娠腰腹及背痛夫腎主腰勞損經虛風冷乘之則腰痛乘虛入腹則腹痛故腰腹相引而痛痛不止恐墜胎又有勞傷腰腹背痛補中益氣加杜仲然多有因病淋症而痛者宜體察之止用加味導赤湯治淋淋止痛除妊娠環跳穴痛屬腎虛宜六味地黃湯加杜續或千金保孕丸妊娠目赤痛咽喉痛口鼻唇舌瘡痛俱用涼膈散加減妊娠負重跌僕凝血作痛欲服活血藥則恐傷胎不服則所傷之血留而不去治之者當先辨胎之死生如無別症只用黑糖熬枯入陳酒童便調服細嚼連皮胡桃過口死者當下生者其痛即止若因怒跌僕或手足抽搐者紫蘇飲加鉤藤倘去血過多八珍湯去茯苓加阿膠艾葉黃耆人參養胃湯治食滯痞滿人參蒼朮米泔水浸去皮麻油拌炒黃色陳皮去白藿香制夏厚朴去皮薑汁炒茯苓草果炙草薑棗烏梅引水煎服千金芩術芍藥湯治妊娠腹中滿痛叉手不得飲食白朮六錢土炒黃芩二錢白芍四錢上三味水煎分三服半日令盡紫蘇飲治妊娠臨月浮腫喘脹並子懸症胎不安上㽱作痛或臨産氣結不下等症當歸酒洗紫蘇川芎芍藥酒炒陳皮大腹皮黑豆水煮制淨各一錢人參炙草各五分引加生薑三五片蔥白七寸水煎服感冒風寒去腹皮加香豉胎動不安加炒黃芩土炒白朮胎不運動加木香砂仁膠艾湯治婦人漏下或半産後下血不絶或妊娠下血腹痛亦治損傷衝任月水過多淋漓不斷乾地黃二錢芍藥一錢半阿膠蒲黃炒成珠艾葉當歸各一錢川芎甘草各分千金托裡散治半身以下濕熱疼重而腫厚黃柏薑汁製數次蒼朮茅山者佳去皮切片麻油拌炒黃色等分為散薑汁調空心溫酒送二錢膠艾芎歸湯治妊娠二三月至八九月頓僕跌傷胎動不安腰腹疼痛欲死已有所下阿膠蛤粉或蒲黃炒珠川芎當歸乾地黃艾葉四烏湯治血中氣滯小腹急痛熟地當歸各二錢酒洗川芎八分白芍一錢半酒炒烏藥六分香附七分制炙草五分加味導赤湯治孕婦小便少又澀痛者謂之子淋又治溺血人參生地條芩木通甘草梢麥冬去心赤芍各一錢淡竹葉十五片東垣涼膈散孕婦有熱病如目赤口舌瘡之類各隨其症加減用之黃芩酒炒黃連酒炒山梔仁酒炒連翹去心桔梗生草各等分薄荷葉少許胎逆上逼脹滿子懸論妊娠胎逆上逼重則脹滿疼痛謂之子懸紫蘇飲為必用之藥蓋因紫蘇飲為治妊娠胎氣不和濁氣舉胎上湊胎熱氣逆心胃脹滿之症且此症挾氣者居多宜疏氣舒郁非紫蘇腹皮川芎陳皮無以流氣非歸芍無以養血氣血既利而胎自降然邪之所湊其氣必虛故以人參甘草補之大抵胎氣上逆皆屬火旺急用芩朮香附之類不可服大寒之藥反致他變豫每治孕婦心胃脹滿用尊生和氣飲甚效子懸症有兩尺脈絶餘脈平和不可錯認死胎且死胎有面青舌青可辨宜紫蘇飲治之則胎歸原位脹消脈起矣如月胎上逼心嘔噦欲死急用童便灌之即下或烏梅肉十枚研爛入生薑三片煎湯灌之亦下取酸以降斂之兼辛以散火氣之逆也又有因坐草太早心懷恐懼氣結不行紫蘇飲一服便産尊生和氣飲治孕婦心胃脹滿人參蘇梗白芍酒炒川芎各六分當歸一錢或六分酒洗腹皮五分制淨木香二分磨沖炙草三分諸血症論妊娠吐血凡七情內傷六淫外感皆足致失血之患一主火熱者以氣血壅養胎元或有所感則氣逆而火上乘心煩滿悶血隨而溢甚者或致墜胎但火有虛實之分實火清熱養血虛火滋陰補水則血安胎固若泛用行血清血之劑胎必墜而禍不旋踵矣鼻衄不止東垣涼膈散加當歸生地各一錢茅花一大團生薑引咳嗽咳血宜涼血地黃湯醫通云咳嗽咯衄胎前皆不宜見如面赤聲啞不治又云凡咯吐血多致墜胎胎賴血養不宜漏溢宜紫蘇飲加條芩尿血乃熱乘血分流滲於脬故令尿血自尿門而下若胎漏則自人門下血可辨宜四物加山梔發灰或阿膠熟地麥冬五味之類如怒動肝火小柴胡加山梔脾氣下陷及勞動脾火補中益氣加茯苓車前若厚味積熱加味清胃散若肝脾血流加味逍遙散腸風臟毒下血者平胃散去蒼朮加槐角防風當歸烏梅治之涼血地黃湯治妊娠咳嗽吐血咳血生地三錢麥冬去心當歸各二錢酒洗黃芩一錢半紫菀知母鹽水炒白朮土炒天冬去心各一錢犀角八分陳皮甘草各四分水煎有喘加栝蔞仁一錢加味清胃散治胃中蘊熱斑疹口舌生瘡齒齦腐爛出血生地四錢丹皮五錢當歸川連酒蒸連翹去心各三錢升麻生草各一錢五分子腫子氣子滿論妊娠子腫與子氣相類但子氣在下體子腫在頭面若子滿症又名為胎水則在五六月以後比子氣子腫不同蓋胎大則腹滿遍身浮腫凡子氣子腫子滿由臟腑本弱或因泄瀉下利耗傷脾胃或寒熱瘧疾煩渴加飲濕漬脾胃使頭面手足浮腫也然水漬於胞兒未成形則胎多損壞故初妊即腫急宜調治水去脹消仍用六君子調補所謂子腫者妊娠面目虛浮多因脾胃氣虛或久瀉所致宜健脾利水全生白朮散主之或用健脾利水湯所謂子氣者妊娠自三月成胎之後兩足面漸腫至腿膝或腰以下腫行步艱難以致喘悶不寧飲食不美似水氣狀甚至腳指間有黃水出者蓋脾主四肢脾氣虛弱不能制水而發腫肺金少母氣滋養而氣促滿悶諸書名曰子氣即水氣治此病者先服加味天仙藤散如不效則服茯苓湯再不效服補中益氣湯加茯苓至孕婦八九個月脛腿俱腫非水氣比不可以水氣治之反傷正氣凡有此者必易産因胞臟中水血俱多不致胎燥也所謂子滿者妊娠至五六個月胸腹急脹腹大異常或遍身浮腫胸脅不分氣逆不安小便艱澀名曰子滿又為胎水不利若不早治生子手足軟短有疾甚至胎死腹中宜服千金鯉魚湯治其水全生白朮散治妊娠面目虛浮如水腫脹白朮一兩土炒生薑皮大腹皮豆汁制淨茯苓陳皮各五錢為末每服二錢米飲調下加味天仙藤散治孕婦腰腳腫虛人多有此症天仙藤即青木香藤洗略炒制香附紫蘇各六分陳皮四分烏藥五分木香二分薑皮三片虛人加人參一錢土炒白朮二錢酒洗當歸二錢或兼服補中益氣湯茯苓湯治孕婦六七個月以來兩足腫大行步艱難腳指間有黃水出此名子氣人多有之生子之後其腫自消甚者此湯主之白茯苓白朮土炒陳皮制香附烏藥各一錢紫蘇連莖葉炙草各五分木瓜三片千金鯉魚湯治孕婦胸腹脹滿或遍身浮腫小便艱澀名曰子滿又為胎水不利或胞中積水以致胞死腹中白朮五錢土炒白茯苓四錢當歸身三錢酒洗白芍二錢鯉魚一尾重二斤要活的將魚去鱗腸加橘皮少許或五分薑七片用水扣湯煮取汁一盞半去魚入藥四味魚汁內煎七分空心溫服渣再製如前子煩並五心煩熱及煩躁口乾論妊娠心驚膽怯煩悶不安名曰子煩竹葉安胎飲主之大抵皆由心肺虛熱是以擾亂心煩或積痰於胸吐涎惡食亦令心煩劇則胎動不安如心肺虛熱或積痰於中千金竹瀝湯若吐甚胎動不安煩悶口乾不得眠又吐涎過多以致外雖不熱而覺五心煩熱或日間不覺而夜覺熱者並宜加味竹葉湯至於娠婦煩躁口乾者緣足太陰脾其氣通於口手少陰心其氣通於舌臟腑氣虛熱乘心脾津液枯燥故心煩口乾與子煩大同小異宜用加減參麥湯竹葉安胎飲治孕婦心驚膽怯煩悶不安名曰子煩症人參生地棗仁去殼炒研遠志甘草水制去骨各一錢當歸酒洗白朮土炒各二錢麥冬去心條芩川芎各八分陳皮炙草各四分竹葉十四片薑棗煎服千金竹瀝湯治妊娠子煩竹瀝一盞茯苓三錢麥冬去心防風黃芩各三錢加味竹葉湯治妊娠心煩不解名曰子煩並治五心煩熱人參黃芩各一錢茯苓一錢五分麥冬二錢半去心竹葉五片粳米一撮水煎空心熱服加損參麥湯治孕婦心神煩躁壅熱口乾人參知母麥冬梔子炒各一錢栝蔞根犀角磨各八分條芩炙草各五分棗一枚水煎服夏加竹瀝八分薑汁少許子淋論妊娠小便淋漓澀少由氣血聚養胎元不及敷榮滲道遂使膀胱鬱熱又云妊娠胞系於腎腎間虛熱移於膀胱而成斯症名曰子淋加減安榮散主之然古方安榮散內有滑石但石乃鎮重之劑恐致墜胎若臨月猶可如在七八月之前宜去此味加石斛山梔為穩全書云子淋症用安榮散不應兼服八珍湯如腿足轉筋而小便不利急用八味丸緩則不救豫謂桂附犯胎忌用當是麥冬車前之八味丸也加減安榮散治孕婦小便短澀或成淋漓人參當歸酒洗各二錢麥冬二錢或三錢白朮一錢土炒通草茯苓皮各八分生草五分燈心五分轉胞淋閉論妊娠轉胞乃臍下急痛小便不通凡強忍小便或尿急疾走或飽食忍尿或忍尿入房使水氣上逆氣逼於胞故屈戾不得舒張所致非小腸膀胱受病而利藥所能利也法當治其氣則愈凡婦人稟受弱憂悶多性躁急食厚味者恆有之因胞不自轉為胎所壓胎若舉起胞系自流水道自通矣用二陳升提飲又有用補中益氣湯服後探吐以提其氣自通通後即用參耆大補恐墜胎也但子淋與轉胞相類小便頻數點滴而痛者為子淋膀胱小腸虛熱也虛則不能制水熱則不能通利故淋若頻數出少不痛者為轉胞間有微痛終與子淋不同耳論中急痛乃急欲便而痛得便則止間有微痛與子淋點滴痛不同二陳升提散治孕婦臍腹作痛小便淋閉不通或微痛與淋有別由氣虛胎壓水胞人參一錢白朮土炒生地各一錢半當歸二錢川芎八分半夏六分制或油炒柴胡升麻陳皮炙草各四分薑一片煎服豫謂探吐法莫若通後服提補之藥子嗽論妊娠咳嗽屬風寒蓋肺臟內主氣外司皮毛皮毛不密寒邪乘之則咳嗽嗽久亦恐墜胎寧肺止嗽散加減用之有久嗽不愈多因脾土虛而不能生肺氣以致腠理不密外邪復感或因肺虛不能生水以致陰火上炎治法當用補中益氣湯以培土金六味丸加五味以生腎水為善寧肺止嗽散治孕婦風寒咳嗽麥冬二錢知母一錢桔梗紫蘇各五分杏仁十粒去皮尖桑白皮六分甘草四分喘急論妊娠氣喘不得臥有因乍感風寒客邪為害者宜發散自愈參蘇飲主之若脾虛四肢無力肺虛不任風寒腎虛腰痠短氣不能行步猝然氣喘不息此脾肺素虧母虛子亦虛腎氣不歸元而上乘於肺也生脈散補中益氣湯去升柴主之丹溪云火動作喘此胎前最多蘇桔湯可加減用之獲效參蘇飲人參紫蘇乾葛前胡制夏茯苓陳皮各等分枳殼麥炒桔梗木香甘草各減半蘇桔湯治孕婦風寒咳嗽並治火動作喘天冬六分去心桔梗一錢五分紫蘇黃芩貝母去心各八分杏仁十粒陳皮知母甘草各四分泄瀉論妊娠泄瀉有風寒暑濕之外感飲食生冷之內傷病發一時察其所因如胃風加味治中湯然又有由脾腎二臟虛者不可不知夫血統於脾血壅胎元則脾陰虛而食不運化脾主健運下焦壅滯而清氣難舒於是水穀難消而作瀉或因胎繫於腎胎竊其氣以擁護而腎氣既弱命門火衰不能上蒸脾土此皆妊娠泄瀉之由也如脾虛內傷用加味六君子湯隨所因而加之命門火衰加益智以助之至於妊娠久瀉元氣下陷發熱作渴肢體倦怠用補中益氣湯加味治中湯治飲食過多脾胃之氣不足運化而作瀉人參白朮土炒炮薑甘草各一錢陳皮青皮各七分砂仁五分水煎服霍亂論妊娠因甘肥過度腐積成痰或七情鬱結氣盛為火停蓄胃中乍因寒熱之感邪正交爭陰陽相混故令心腹絞痛吐利並作揮霍變亂謂之霍亂如邪在上則當心痛而吐多邪在下則當臍痛而利多邪在中脘則腹中痛吐利俱多吐多傷氣利多傷血血氣受傷不能護養其胎邪氣鼓擊胎元子母未有不殞者此危症不可不亟治也宜香蘇散加藿香葉或先服後探吐之又加味四味紫蘇和胎飲治心腹絞痛上吐下瀉亦效香蘇散此方治霍亂平正之至香附炒紫蘇各二錢陳皮一錢藿香葉縮砂炙草各五分水煎服如轉筋加木瓜一錢胎動不安加土炒白朮一錢半夏月得之加黃芩一錢五分炒黃連一錢香薷二錢如冬月得之加人參炒白朮各一錢炮薑五分加味四味紫蘇和胎飲治心腹絞痛上吐下瀉紫蘇黃芩白朮土炒各一錢半炙草以上四味和胎飲本方藿香葉陳皮各一錢砂仁炒五分中惡中暑中濕中風論妊娠忽然心腹刺病悶絶欲死者謂之中惡即俗謂㽱腸痧是也蓋因血氣不和精神衰弱邪毒之氣得以中之孕婦病此亦致損胎薛氏云此症當調補正氣為善用金銀藤一味煎湯飲之濟陰綱目內用散滯湯治之又煮艾方治正中惡極妙妊娠盛暑時中暑熱之毒其症發熱而渴自汗精神昏憒四肢倦怠少氣清暑和胎飲主之妊娠中濕或因早行感霧露之氣或冒水或久居下濕地或大汗出浴冷水其症發熱骨節煩痛身體重著頭痛鼻塞黃芩白朮湯主之妊娠中風因體虛則中之乃四時八方之氣為風自沖方來中人即病中其皮毛經絡者則發寒熱頭項身體皆痛或肌肉頑痹中其筋骨者則拘攣強直中其臟腑者則卒倒昏悶口眼喎斜手足瘈瘲口噤不語孕婦得此不可用常治風之法以補虛安胎為本兼用搜風之劑搜風安胎飲治之但胎前正中風者少子癇之症實多與中風見症無異醫者當審實是中風方可用搜風安胎否則子癇症治也散滯湯專治觸惡胃氣傷胎肚痛手不可近不思飲食青皮三錢黃芩芍藥各二錢歸尾一錢半川芎一錢木香五分炙草少許上分二帖水三盞先煮苧根二大片至二盞去苧根入前藥同煎至一盞熱服清暑和胎飲黃耆炙人參白朮土炒黃芩黃連知母麥冬炙草各一錢五味十二粒黃芩白朮湯黃芩白朮土炒各五錢蘇葉二錢半薑五片水煎服搜風安胎飲歸身黃耆蜜炙羌活黃芩秦艽防風炙草各一錢薑棗煎服至以平為期子癇論一名子冒妊振子癇乃為惡候若不早治必致墜胎其症或口噤項強手足攣縮言語蹇澀痰涎壅盛不省人事或忽然眩暈卒倒口不能言狀如中風實非中風之證不可作中風治即或無痰言語如常但似風狀多因血燥血虛亦不可概以風治而誤也羚羊角散主之馮氏云孕婦忽然僵仆痰涎壅盛不省人事乃是血虛而陰火炎上鼓動其痰左脈微數右脈滑大者名曰子癇宜四物養血酒芩清熱二陳化痰理氣治法仍以安胎為主勿過用中風之藥此由血虛生熱熱盛生風皆內起之風火養血而風自滅若心肝風熱用鉤藤湯肝脾血虛加味逍遙散肝脾鬱怒加味歸脾湯氣鬱痰滯紫蘇飲脾郁痰滯二陳加竹瀝薑汁密齋云孕婦氣虛挾痰火症狀如中風卒倒即醒醒而復發清神湯主之豫謂妊娠子癇至有目昏黑而厥者胎前絶少但一有此症即是兒暈屬氣與痰故目昏黑髮厥只服紫蘇飲慎不可服蘇合丸及烏藥順氣散等藥至於破傷失血或吐衄血忽患口噤項強背直類中風症皆因失血所致不可不知用荊防安胎散治之羚羊角散治孕婦口噤項強手足攣縮痰壅不省人事羚羊角苡仁米棗仁去殼炒各一錢當歸二錢酒洗獨活五加皮茯神各八分川芎七分杏仁十粒去皮尖防風五分木香三分甘草四分薑引鉤藤湯治孕婦手少陰足厥陰血虛風熱人參當歸茯神桑寄生鉤藤各一錢苦桔梗一錢半水煎服清神湯治孕婦忽然眩暈卒倒口噤不能言狀如中風須臾即醒醒而復發乃氣虛挾痰火子癇症人參白朮茯苓白芍黃耆蜜炙麥冬歸身炙草各等分食遠服荊防安胎散人參當歸酒洗白朮土炒各三錢生地天麻各二錢麥冬一錢條芩八分荊芥防風各三分陳皮甘草各四分水煎服痢論妊娠痢下因飲食生冷脾胃不能克化致令心腹疼痛傷血則赤傷氣則白氣血俱傷則赤白相雜蓋血屬陰陰傷則受熱居多然又有陽氣傷不能統陰血而痢赤又不得不從事於辛溫故治血痢猶當以色之顯晦驗其虛實寒熱故凡積之瘀晦不鮮清稀不稠皆虛寒之候即陽不統陰之血急投人參薑艾或可保全倘不審而誤服芩連乃速其斃也惟積之稠黏紫赤而光澤者合用苦燥以堅腸胃之滑脫又必當佐以調氣之藥則陰邪解釋非若白痢之不可雜以芩連芍藥等味引領滯穢襲傷陰血也氣屬陽陽傷則受冷居多即有火注下迫皆陽氣鬱遏本寒標熱之症不可純歸於熱但當驗其積之稠黏如糊色白如脂方可暫與清熱治標若汁沫如水色晦如塵急須溫理其氣即有熱症皆假象無疑其虛實寒熱既分而又有三禁三善五審之不可不知也一禁滌蕩腸胃恐陽氣下陷胎氣愈墜二禁滲利膀胱恐陰津脫亡胎失榮養三禁澀滯氣恐濁氣愈滯後重轉加故善治妊娠之痢惟以調氣為先即已敗積沫隨氣而下未傷津液統之而安夫調氣有三善一使胃氣有常水穀輸運二使腹滿腹痛後重漸除三使濁氣開發不致侵犯胎元所謂五審者一審飲食之進與不進夫痢乃腸胃受病若痢勢雖甚飲食無妨者易治故痢以噤口為最劇在初起濁邪全盛之時不足為慮但要清理積滯飲食自進矣若七日以後尚不能食脈反數盛此必初時失於清理之故急需調氣理中則積沫漸下飲食漸進矣或初時能食至一旬一氣後反不能食脈息不振此必滌蕩太過胃氣受傷所致亦有過用芩連檳朴苦寒破氣而致厄逆嘔噦者胃氣大敗最危之兆惟峻與溫補庶可挽回若脈見數疾無倫或翕翕虛大或歇止不前或弦細搏指者皆胃氣告匱百不一生矣二審溲之通與不通下痢清濁不分若痢雖頻而水道順利者胎必無虞若月數將滿胎壓尿胞每多溲便頻數轉胞脹悶之患切禁利水傷津急與開提自通但須察其脈無過壯過硬之形便宜補中益氣稍加澤瀉車前以升清降濁投之無不輒應非特妊娠為然即平人久痢津液大傷而溲澀不通者亦宜此治法也三審腹之痛與不痛下痢腹痛必然之理然間有濁濕下趨而無郁沸之火者則不痛也但此多見於肥白人之白痢若血痢與瘦人多火者罕見也治宜調氣運積不用清火明矣原其腹痛有寒熱之分痛有止歇痛則奔迫下墜至圊不及者火也痛自下而攻擊於上者火也痛而脹滿不勝摩按熱飲愈甚者火也實也痛無止歇常時痛而無絞刺者寒也痛自上而奔注於下者寒也痛而不滿時喜溫手摩按飲熱漸緩欲至圊而可忍須臾者虛也寒也大約初痢脹痛為熱為實久痢㽱痛為虛為寒即初因火注切痛痢久傷氣亦必變為虛寒也故久痢腹痛之脈無論大小遲數但以按之漸漸小者並屬虛寒急需溫補慎勿利氣惟急痛脈實久按不衰者可稍用炮黑薑連和之四審後之重與不重下痢後重濁氣壅滯也夫開通壅滯必以調氣為本在妊娠猶為切要調氣則後重自除而胎息自安但初痢後重首宜開發其滯若久痢後重又當升舉其陽陽氣升則胃氣運胃氣運則周身中外之氣皆調達而無壅滯之患矣故治孕婦之後重無問胎之大小但脈見有餘則宜調氣脈見不足便與升提雖血痢亦宜陽藥一切滋膩血藥總無干預以氣有統血之功則血無妄行之慮也五審身之熱與不熱下痢為裡氣受病若見身熱表裡俱困元神將何所恃而得祛邪之力哉惟人迎之脈浮數可先用和營透表之法分解其勢然後徐行清理若初痢不發熱數日半月後發熱脈來漸小或虛大少力者此正陰內亡虛陽發露於外在平人或可用辛溫暖補飲之以歸其源若妊娠則桂附又難輕用惟藉參朮薑萸膠艾之屬非大劑濃煎峻投難望其轉日回天之績也考之醫通云常用厚朴去乾薑湯治妊娠能食腹脹後重積穢稠黏之白痢厚朴生薑甘草半夏人參湯治妊娠腹脹後重赤白相兼之痢黃芩芍藥湯送香連丸治妊娠能食後重積穢稠黏之血痢連理湯合千金三物膠艾湯治妊娠少腹疼痛瘀晦不鮮或間有鮮血之痢駐車丸治妊娠發熱後重陰虛畏食之血痢白頭翁加甘草阿膠湯治妊娠熱毒內攻噤口不食腹脹後重膿血稠黏之痢千金膠艾榴皮湯即三物膠艾湯治妊娠膿血清稀胎動不安久泄不止之痢補中益氣湯治妊娠先瘧後痢及瘧痢齊作元氣下陷胎氣下墜小便頻數或轉胞不得溺之痢以上諸方並加砂仁以調其氣烏梅以調其血未嘗不隨手輒效也豫每用一味阿膠飲或阿膠黃連飲均治孕婦之痢甚妥獲效厚朴去乾薑湯厚朴去皮薑汁炒陳皮泡去浮白茯苓炙草各等分煎服厚朴生薑甘草半夏人參湯治胃虛嘔逆痞滿不食之症人參隨宜厚朴一錢半薑製製半夏二錢炙草八分生薑引黃芩芍藥湯黃芩白芍各三錢炙草二錢香連丸治下痢赤白相兼白多於赤者川連六兩用開口吳萸一兩同黃連炒去吳萸不用木香一兩共末醋糊丸每服五十丸米湯砂仁湯任下連理湯治胃虛挾食痞滿發熱人參隨宜白朮一錢半土炒焦炮薑六分黃連八分茯苓一錢炙草六分千金三物膠艾湯治血痢又痢下不止阿膠艾葉酸石榴皮三味等分煎服駐車丸治陰虛下痢發熱膿血稠黏及休息痢阿膠三兩黃連炒黑當歸各五錢炮薑一兩上四味搗篩醋煮阿膠為丸梧子大每服四五十丸晝夜三服米飲下白頭翁加甘草阿膠湯治挾熱痢下膿血及産後痢不止白頭翁黃連炒黑黃柏炒黑秦皮炙草各一錢阿膠三錢上六味先煮上五味去滓內膠煬盡溫分三服阿膠黃連飲又名黃連阿膠湯治孕婦痢疾若安胎則痢愈重治痢則胎難全阿膠能止膿血之痢且止腰痛固胎以之為君黃連芍藥甘草皆以為佐枳殼麩炒少加二三分以寬其後重痛痢減去之瘧論妊娠患瘧無論胎息月數多少總以安胎為主而世之所謂安胎無過黃芩白朮不知黃芩乃治熱盛胎動不寧白朮乃治脾虛胎氣不固若氣虛下陷誤用黃芩氣滯壅逆誤用白朮為害何可勝言故善治胎産症者必審孕婦形體之肥瘦氣血之偏盛若形色蒼肌肉䐃堅者必多濕多痰無論何疾必顯濕熱本病脈多滑實有力絶無虛寒脈弱之候可峻用豁痰理氣藥治其本質然後兼客邪見症而為製劑治宜二陳湯隨經加透表藥或合小柴胡用之蓋柴胡為瘧疾之嚮導故多用之然有自汗過多尺中微弱或熱盛手足清始終不用柴胡而用建中桂芍收功者或見煩渴脈實大便六七日不通陽明腑實又宜涼膈去硝黃加鮮首烏調之大抵病邪初發元氣未耗疏風滌痰消導飲食在所必需然必宜大劑白朮培護中土以脾胃為一身之津梁土厚自能載物其最可慮在三四發至六七發其勢最劇若過半月雖淹纏不止邪熱漸衰可無胎隕之虞也或有瘧久氣血虛敗而小産者此皆失於調治也若六七發後不止即當和營健脾若稟質柔脆雖有風邪不得純用表藥以風藥性散能使胎氣上逆而為嘔逆喘脹膈塞痞滿之患雖有實滯不得過用降泄之味能引邪氣下陷致胎墜不安而為泄利不食小腹疼重之患矣若疫瘧毒盛勢劇急與涼膈承氣黃連解毒救之瘟瘧惛惛不爽煩熱大渴或壯熱無寒或先熱後寒者當與桂枝白虎人參白虎撤其在裡之熱不可與夏秋痁瘧比例而推也蓋有是症用是藥有故無隕惟在速祛邪毒以救胎息之燔灼若遲疑未決救無及矣又有氣血虛損其瘧由虛致不因暑氣而作如經云陽微惡寒陰弱發熱或風寒因虛而乘之若寒熱不已重蒸其胎胎亦受傷而墜宜輕解表邪兼大補氣血以主之更有患胎瘧者一遇有胎瘧病即發此人素有肝火遇孕則水養胎元肝虛血燥寒熱往來似瘧非瘧也以逍遙散清肝火養肝血兼六味丸以滋化源寒熱自退余常用加減丹溪安胎飲治孕瘧甚覺穩妥從未用截藥而孕症未嘗不愈也加減丹溪安胎飲治孕婦瘧疾白朮土炒當歸熟地各二錢川芎條芩各八分製半夏七分人參一錢藿香五分草果青皮各三分紫蘇廣皮炙草各四分烏梅二枚薑一片傷寒溫熱時疫論妊娠傷寒時值冬令為寒所傷其輕者淅淅惡寒翕翕發熱微嗽鼻塞數日即愈不藥亦可或用蔥白連須三五莖生薑三片煎服即解如所感者重以致頭疼先寒後熱久必傷胎藥多避忌務宜謹慎不可與常婦概治竟用發表以致損胎誤其母子性命但服蔥白香豉湯自愈故千金治妊婦傷寒用蔥白生薑水煎熱服取汗即安是以蔥白香豉湯香蘇散可解表邪又可安胎況蔥白不惟性能解表且善安生胎下死胎若感寒孕婦胎傷未死但用蔥一把水煮食之汗出即安如胎已死須臾自出不應加生薑蘇葉不可輕用表藥招尤若妊娠邪在半表半裡擇綱目內黃龍湯即小柴胡湯變體用法其加減亦可採擇而用如表症已愈但發熱大渴用香蘇散加金花湯便結者加入大黃或用三黃解毒湯所以胎前疫症與傷寒陽明腑症內實便祕須急通大便方不損胎若大便自利乃正氣下泄胎必難保惟大小便如常知里無熱則不傷胎氣至妊娠熱症亦須急治恐致落胎千金用蔥白香豉湯取汁即愈又有用柴葛安胎飲者如嘔吐煩躁用生津葛根湯者甚則斑出黑色用梔子蔥豉湯者密齋用加味化斑湯此皆熱入於裡陽明症之方藥也醫通治孕婦溫熱時行及傷寒邪氣內犯熱毒逼胎並宜千金石膏大青湯急救庶可保全遲則不救又有石膏六合湯升麻六合湯立方甚穩録後以備採用凡胎孕藥內不得已而用大黃轉藥須用酒製薑桂附子用黃連甘草制之則無害矣蔥白香豉湯千金治時疫傷寒三日以內頭痛如破及溫病初起寒熱蔥白連須一握香豉三合水煎入童便一合日三服秋冬加生薑二兩黃龍湯治妊娠傷寒得之三五日後有惡寒發熱內有煩渴引飲小便赤澀之症此邪在半表半裡宜此方主之柴胡二錢黃芩一錢半人參甘草各一錢薑棗為引水煎服如寒熱往來無汗口乾加葛根二錢去棗入蔥白三根如頭痛不止加川芎白芷各一錢去棗加蔥白三根如發熱有汗口渴加土炒白朮一錢半栝蔞根一錢半如脈浮大有力大熱大渴人參白虎湯去薑棗柴葛安胎飲治孕婦熱病骨節疼痛如不急治則落胎柴胡葛根青黛各八分石膏一錢半升麻五分梔子一錢知母七分蔥白三根生津葛根湯治孕婦熱病嘔吐不食胸中煩躁人參葛根蘆根麥冬知母炒梔子炒各一錢竹茹一團蔥白三寸梔子蔥豉湯治孕婦熱病斑出赤黑色小便如血氣急欲絶胎落之症梔子炒黃芩升麻各一錢生地二錢青黛八分豆豉四十九粒杏仁十二粒石膏一錢半煅加味化斑湯治孕婦傷寒熱病不解遍身發斑赤如錦文者人參知母生地黃芩梔仁甘草各一錢石膏二錢淡竹葉二十片豆豉半合食遠服千金石膏大青湯治妊娠傷寒頭疼壯熱肢體煩痛此方既可散邪又能安胎允為孕婦傷寒溫熱時行神方也石膏二錢大青黃芩各八分前胡知母梔仁各一錢蔥白一莖水煎溫服石膏六合湯治妊娠傷寒身熱大渴而煩當歸川芎白勺生地各一錢煅石膏知母各五分水一盅半煎一盅溫服升麻六合湯治妊娠傷寒下後過經不愈濕毒發斑如錦文者當歸川芎白芍生地各一錢升麻連翹各七分水煎溫服譫語論妊娠譫語為臟腑熱極之候急宜童便時時灌之不應用生地黃黃連湯清其血中之火庶胎得安脈實者加酒大黃下之下遲則傷胎也亦有傷胎胎下而下血心神無主譫語雖用峻補亦難有效其治法方藥俱載産後妄言妄見門若孕婦症見舌青者其子已死腹中急當下之若雙胎一生一死者必腹中半邊冷半邊熱如母患熱症臟腑熱甚蒸其胎兒因致死但服黑神散加生蒲黃以暖其胎則胎即出矣胎未死井泥塗臍以護胎氣多有保全者生地黃黃連湯治失血後燥熱瘈瘲脈數盛者生地二錢防風川芎各八分當歸一錢半黃連七分黃芩炒黑山梔各一錢赤芍一錢血症黑神散治吐血衄血屢發不止炮薑肉桂各一兩熟地四兩當歸蒲黃篩淨炒黑各三兩白芍酒製炙草各二兩上為散每服四錢用黑豆半合微炒香淋酒半盞和水半盞煎一半入童便半杯和服氣虛加人參三兩炙耆六兩以固衛氣庶無營脫之患鬼胎論凡婦人氣血虛損精神衰弱邪思蓄注衝任滯逆脈道壅瘀不行狀如懷娠故曰鬼胎然細究其理鬼胎者偽胎也如人邪淫之念一起則肝腎相火自動有夢與鬼交者非實有鬼神交接成胎也即經所謂思想無窮所願不遂白淫白濁流入子宮結為鬼胎乃本婦自己血液淫精聚結成塊血隨氣結而不散以致胸腹脹滿儼若胎孕耳非偽胎而何故鬼胎之脈沉細弦澀或有時虛浮有時沉緊忽大忽小皆陽氣不充之驗其腹雖漸大而漫起重墜終與好胎不同當臍或臍下左傍雖微動亦與正胎迥別所以一見經候不調就行調補庶免此患若停經瘀滯而得即血癥氣瘕之類則病已成當調補元氣為主而繼以去積之藥乃可然欲於補中兼行無如決津煎欲去其滯而不猛峻無如通瘀煎若由陽氣不足或肝脾鬱怒所傷不能生髮致陰血不化而經閉為患肚腹漸大以加味歸脾湯加味逍遙散再加去白陳皮八分如干嗽用蜜制治之自愈此外如狐魅顯類之遇者則實有所受而又非鬼胎之謂當於癥瘕類求法下之又常見婦人得孕經止尺脈或澀或微弱而無他病此子宮正氣不全精血雖凝而陽虛陰不能化終不成形每至産時而下血塊血胞必大劑溫補預調而後方能成孕也決津煎治婦人血虛經滯不能流暢而痛極者以水濟水若江河一決而積垢皆去用此湯隨症加減主之此用補為瀉之神劑當歸三五錢或一兩澤瀉一錢半牛膝二錢肉桂一二三錢熟地二三錢或五七錢或不用亦可烏藥一錢水二盅煎七分服須食前如嘔惡加焦薑一二錢陰滯不行非加附子不可如氣滯而痛脹加香附一二錢或木香七八分如血滯血澀加酒炒紅花一二錢通瘀煎治婦人氣滯血積經脈不利痛極拒按及産後瘀血實痛並男婦血逆血厥等症歸尾三五錢山楂制香附紅花新者炒黃各二錢烏藥一二錢青皮澤瀉各錢半木香七分水二盅煎七分加酒一二小盅食前服腸覃似孕證蓄血似孕論婦人腸覃似孕乃寒氣客於腸外與衛氣相搏氣不得榮因有所繫瘕而內著惡氣乃起瘜肉乃生其始生大如雞卵稍以益大狀如懷子按之則堅推之則移月事以時下此結氣大腸為氣病而血不病故月事不斷當用散氣之劑治之其蓄血似孕因多鬱怒經閉不月腹漸大初時人以為孕至過月不産諸症漸見此蓄血子門為血病當破血藥下之孕婦出痘論凡孕婦出痘熱能動胎胎落則氣血衰敗而不能起發灌漿矣故始終以安胎為主外用細軟之帛緊兜肚上切不可用丁桂燥熱之品及食牛蝨毒物之類以致觸犯其條芩白朮艾葉砂仁之類與痘相宜者採而用之其初發熱則以參蘇飲發之痘既出後則多服安胎飲保之渴者則用人參白朮散加減瀉者則用黃芩湯合四君子湯內加訶子血虛者則以四物湯加托藥色灰白而起發較遲者則用十全大補湯去桂服之總之不問輕重悉以清熱安娠為主更有孕婦出痘正當盛時忽臨正産者勢必氣血俱虛亦只以十全大補湯大補氣血為主虛寒者少加熟附若腹中微痛者此惡露未盡也宜四物湯加乾薑桂心木香黑豆用熟地黃而去芍藥蓋恐寒涼有傷生氣然有當用者酒炒用之若寒戰咬牙腹脹不渴而足冷身熱者此乃脾胃內虛外作假熱也宜參耆歸附木香之類一二劑而愈者吉不愈者凶若孕婦肥胖者則氣居於表而慊於內也人參可多黃耆宜少多加帶殼縮砂切忌脫蒂果子之類至有痘將收靨忽作泄瀉口渴飲水小便短少其痘胖壯紅潤者此內熱也宜五苓散內加黃芩芍藥之類若至滑瀉不止食少腹脹而足冷痘色灰白脈細無力者此犯五虛必死之症也凡婦人方産之後或半月左右適逢出痘者此無胎孕繫纍惟氣血尚虛治宜大補榮衛為主若痘出多者則加連翹黏子之類大便自利者則用肉果炮薑之類余即照常一例而治至於孕婦出痘在於初出之時胎落者則血氣雖為大虛然熱毒亦因走泄兼之未經起脹灌漿則血氣未曾外耗倘非險逆加以大補托裡每多得生至於收靨之時胎落者則毒已出表消散亦多無事但重虛而元氣易脫倍宜補益耳若正當起脹灌漿而胎落者則氣血衰敗內外兩虛既不能逐毒以外出則毒必乘虛而內攻其為不救者多矣參蘇飲人參紫蘇乾葛前胡制夏茯苓陳皮各等分枳殼麥炒桔梗木香甘草各減半黃芩湯治熱利黃芩炙草芍藥各等分大棗五七枚水煎服妊娠麻疹論妊娠出疹當以四物加減而加條芩艾葉以安胎清熱為主則胎不動而麻疹自出矣然熱毒蒸胎胎多受傷但胎雖傷而母實無恙也蓋疹與痘不同痘宜內實以痘當從外解故胎落毒氣乘虛而內攻其母亡疹宜內虛以疹當從內解故胎落熱毒隨胎而下其母存雖然與其胎去而母存孰若子母兩全之為愈也且古人徒知清熱以安胎不思疹未出而即以清熱為事則疹雖出而內熱愈深是欲保胎反足以傷胎也宜輕揚表托則疹出而熱自清繼以滋陰清解則於疹於胎兩不相礙不安胎而胎自安矣如疹出不快宜白虎湯合用升麻葛根湯倍加元參牛蒡治之胎氣上衝急用苧根艾葉煎湯磨檳榔服之再以四物湯進之熱甚則胎不安服固胎飲數劑如又不愈腹疼腰痠即知胎有必墜之機如胎墜即以産法論治矣升麻葛根湯葛根升麻白芍甘草各等分水一盞煎七分溫服此解表發散之方也表熱壯盛邪實於表經曰輕可去實故用升麻葛根以疏表所以然者升麻能解疫毒升陽於至陰之下以助發生之氣葛根能解熱毒兼疏榮衛以導起發之機二味之外又加甘草佐之以和在表之氣芍藥佐之以和在裡之榮去其實邪和其榮衛風寒自解麻疹自出固胎飲止痛安胎地黃川芎歸身人參白芍陳皮各一錢白朮土炒黃芩各一錢半甘草三分黃連黃柏各一分桑上羊兒藤七葉圓者上細切每服二三錢入糯米二十粒水一盅煎至七分溫服痛加砂仁血虛加阿膠催生萬全湯人參三錢至五錢大補元氣以為君當歸三錢大補榮血以為臣去蘆川芎一錢入肝以疏鬱滯少寓升提之性則降下之藥得力桃仁十三粒不去皮尖搗碎取苦可去舊甘能生新滑能潤下乾薑一錢溫能通行血分炒黑黃色焦則令其下降而遏其上升也炙草六分令其藥性少緩中宮得受補益不使即為下墜也牛膝梢二錢既能下行腹走十二經絡令其經絡無壅則氣血效力以為運行推出紅花三分多則破血少則活血生新耳酒炒肉桂六分冬天用八分臨煎方去皮切碎藉此引經率領諸藥直入血分且溫可通行散瘀則生産自易加膠棗二枚水煎食前溫服如産婦壯實及無力服人參者去參用之其催生之效尚能倍於佛手散多矣論曰婦人臨産關係母子性命實存亡頃刻之時是以古人立方甚多然産育乃大傷氣血者也其難産又多由氣血不足産後諸疾固屬氣血大虧然産後諸虛皆因産前所致今立萬全湯乃體達生生化二方之意合成一方務取萬全屢用甚驗故以萬全名之先以調補血氣佐以散瘀下降溫中使氣血得力自能健用催生此不催之催也故用人參當歸為君培補氣血壯其主也少加桃仁川芎黑薑炙草酒紅花溫中而散其瘀也牛膝梢桂心溫行導下使無上逆衝心之患不惟催生神效産後更無瘀血凝滯百病不生補而兼溫則不滯溫而兼補則不崩升少降多則氣得提而易下降而兼升則瘀自去而新自歸補多瀉少邪去而元氣無傷苦少甘多瘀逐而中和仍在豈非萬全催生者乎産後脈訣論脈經云産後之脈寸口洪疾不調者死況微附骨不絶者生又曰沉小緩滑者吉實大堅弦疾者凶牢革結代及澀滯不調者不治丹溪曰胎前脈當洪數既産而脈仍洪數者死又曰胎前脈細小産後脈洪大者多死豫見産後多有洪數而生者要知血虛之脈浮洪而數者居多産後血虛故現此脈若不明以告之俗醫多誤認為外感虛虛之禍在此頃刻然此洪數之中自有和滑之象非如牢疾而少胃氣之謂故多死也産經曰胎前之病其脈貴實産後之病其脈貴虛胎前則順氣安胎産後則補虛消瘀此其要也生化湯論生化湯論曰産後諸症皆緣氣血驟下元氣大虧用藥不同常法是以有極不能姑待者則當峻補之中加入溫行之藥峻補則力大而可宣通溫行則流暢而不凝滯至於逐瘀之劑即實症亦不可用峻厲之藥況産後大虛恐血無主宰一任藥力便為崩而不止虛則易脫勢如覆水難收矣夫人遇大病之後血氣兩虛猶當調補況産後脾胃血氣之虛衰更有甚焉者乎今之治産後者亦云元氣因産而虧運行失度不免瘀血停留致成諸疾必以去瘀為先瘀消方可行補甚有用回生丹攻血塊下胞衣殞人性命者此蓋止知專攻舊瘀而不知新血轉傷之害豈知塊固當消而新血猶當生也蓋專消則新血不生專生則舊血反滯豫考新産諸方莫若生化湯為産後第一妙方其方芎歸桃仁溫中行血善去舊血驟生新血佐以炙黑乾薑炙草引三味入於肺肝行中有補化中有生故名生化蓋因功而立名也又有加入益母草一錢五分功效亦同此實治産之良方保全産婦之聖藥也故馮氏因此方之妙變化用於臨産加人參桂牛膝紅花又為催生之神劑矣生化湯方凡孕婦臨月即預備生化湯數劑俟臨産之時即為預先煎就産下隨服二三道以逐瘀生新再無産後之患無論正産半産雖少壯産婦俱宜服之故此湯為産後七日內要藥倘産下之時未及煎服凡産後諸症仍以此湯治之全當歸八錢酒洗川芎四錢乾薑四分炙黑存性桃仁十粒去皮尖打碎炙草五分水二盅煎七分加酒小半盅如素日不能飲酒者加六七茶匙稍熱服之其藥渣留並後帖藥渣合而再煎而帖共三煎在産下一二時辰內未進飲食先相繼煎服能速化舊血而驟生新血不特可免目前暈厥汗崩惡露停滯等患且諸病不生精神百倍矣如胎前素虛之人産後又當再製兩帖煎服以防倦怠若産下已服一二帖而塊痛未除仍當再進幾帖塊痛自消矣産後藥誤須知産後勿輕用烏藥香附木香及耗氣順氣等藥用之反增滿悶雖陳皮用不可過五分産後勿輕用青皮厚朴山楂枳殼陳皮消食藥多損胃減食即枳殼香砂等丸亦多損氣血産後勿用青皮枳實蘇子以下氣定喘用之元氣必脫産後浮麥傷胃耗氣五味能阻惡露棗仁油滑致瀉均為禁忌産後身熱誤用黃芩黃連黃柏梔子損胃增熱致不進飲食且黃芩苦寒無論惡露淨與不淨皆非所宜産後四日內未服生化湯以消血塊勿先用人參耆術致塊不除産後勿輕用牛膝紅花蘇木枳殼等類以消塊猶忌多用獨用至於三稜莪朮枳實山楂等峻藥更不可用若誤用舊血驟下新血亦隨之而損禍不可測也産後勿輕用生地黃以滯血路産後不可用大黃芒硝以通大便反成臌脹産後不可用五苓以通小便用之愈閉三沖論産後危症莫如敗血三沖其人或歌舞談笑或怒罵坐臥甚者逾牆上屋口咬拳打山腔野調號佛名神此為敗血衝心多死醫通云花蕊石散最捷琥珀黑丸丹亦效如雖悶亂不致顛狂者失笑散加鬱金豫謂當於妄言妄見門參看治療若其人飽悶嘔惡腹滿脹痛者為之沖胃醫通云用平胃散加薑桂往往獲效不應送來復丹嘔逆腹脹血化為水者金匱下瘀血湯豫謂當於飽脹嘔逆等門參看治療若其人面赤嘔逆欲死為之沖肺醫通云二味參蘇飲甚則加芒硝蕩滌之子謂當於口鼻黑衄門參看治療大抵衝心者十難救一沖胃者五死五生沖肺者十全一二其醫通所用金石及峻藥等治法亦無可如何之思與其視死不若救生之意耳豫謂治此等症宜用生化失笑抵聖等類平穩藥當亦通神二味參蘇飲治惡露入胞脹大不能出及産後敗血沖肺喘滿面赤幾死者人參二錢蘇木四錢碎水煎服又有入童便熱服大便溏泄者禁用失笑散治婦人心痛氣刺不可忍及産後兒枕蓄血惡血上攻疼痛並治小腸氣痛便治胞衣由瘀血脹滿不能出者五靈脂生酒研澄去砂蒲黃生篩淨為末每服二三錢蔥湯調末服之一方用酒煎熱服按此方如行血各等分俱生用如止血俱炒用或五靈脂減半用若用以止痛蒲黃宜減半又一方蒲黃一半生一半炒用抵聖湯見氣逆嘔吐不食門産後不宜汗下利小便論産後陰血驟下陽無所附孤陽外越每多發熱此乃陰虛生熱切勿作外感而表散生化湯善能退熱以其內有薑草所謂甘溫能除大熱也故産後雖有表症一切風藥性升不可用恐載血上行令人發暈且慮重竭其陽必至汗脫而死即佛手散中川芎辛散能發汗走泄亦須臨時因症審酌用之産後陰血既虧津液自少況臨産勞倦氣虛虛則傳化自遲二腸枯燥勢所必然久則自復或用生化湯養血兼生津助液亦可故産後雖二便暫有不甚通利然於下利等藥必須禁用非特硝黃五苓難於輕試即四物湯中生地芍藥純陰而伐生氣且作瀉而凝血五苓利水傷陰愈通之而愈枯結若誤用而重亡其陰難免孤陽無輔而走脫矣故機要有云胎産之病從厥陰無犯胃氣及上下二焦不可汗不可下不可利小便也新産三審論凡治産後三審不可缺也一審少腹痛與不痛以徵惡露之有無二審大便通與不通以徵津液之盛衰三審乳汁行與不行及飲食多少以徵胃氣之充餒大抵常産之婦開合有權産後子宮即閉兒枕隨氣攻注碎作小塊續續而下所以延綿日期又有由於難産過傷子宮關閘廢弛不能收斂或下血塊大小形色與茄無異此名兒枕是也全塊頓出自無淋瀝之患即有餘血盡歸溲便如皂莢汁少腹略無痛苦切勿認為産後瘀尚未行妄行攻下誤人性命産後又有似乎兒枕痛者摸之亦有塊按之亦微拒手人皆指為兒枕宿血此大不然夫胎胞俱去血亦豈能獨留蓋子宮蓄子既久忽爾相離血海陡虛所以作痛胞門受傷必致壅腫所以亦若有塊而實非正塊腫既未消所以亦頗拒按治此者當安養其臟不久自愈若有瘀服藥生化湯對最殿胞煎或四神散亦可若誤用蘇木紅花元胡青皮之屬反損臟氣必增虛病慎之慎之殿胞煎治産後兒枕疼痛等症如神當歸五錢川芎一錢茯苓一錢炙草一錢肉桂五分水一盅煎八分熱服如脈細而寒或嘔者加乾薑炒黃色一錢如血熱多火者去肉桂加酒炒芍藥一錢四神散見腹痛門血塊痛論産後血塊是孕成余血之所積也夫婦人血旺氣衰二七而天癸至三旬一見以象月盈則虧行之有常則曰經有孕則經水不行其餘血注於胞中以護胎元一月名胎胚二月名始膏三月始成形而名胎方受母血之蔭庇胎形尚小雖食母血而尚有餘汁並前兩月之血積於胞中日久成塊至産時當隨兒下或因産婦送兒送胞勞倦無力或謂調護失宜腹欠溫暖至血塊日久不散疼痛拒按並宜生化湯助血行血外用熱衣暖腹可也慎勿輕服峻劑至崩脫不救暈厥論凡産後暈厥二症皆由氣血並竭苟非急補何能挽其將絶之元神無庸疑義者也但暈在臨盆症急猶甚於厥用藥不及急救法救之如其人微虛者則眼花頭眩或心下滿悶神昏口噤不知人事少頃即蘇或因亡血過多以致虛火乘虛泛上而神不清身無所主其陰血暴亡心神失養心與胞絡君相之火得血則安亡血則危火上熾故令人昏冒火乘肺故瞑目不省人事是陰血暴亡不能鎮撫也經云病氣不足宜補不宜瀉瞑目閣眼病悉屬陰暴去有形之血則火上熾均宜頻灌生化湯或從權急救生化湯二三帖先補血分之虧則塊化血旺神清而暈止大虛者其症面白眼閉口開手冷多汗神昏六脈微細之甚是氣隨血脫而欲絶當劑人參方可回陽恐勢急而補陰不及須以兼用氣藥此陽生陰長之理也以權急救加參生化湯最效但凡大病大虛之人皆能作暈産後之暈因血去而名之曰血暈實非因血而致暈也即有惡血上逆血滯等症亦莫若生化湯溫而行之去瘀止暈之妙豫見江南産科有用當歸一錢益母草一錢人參二錢紅花六分炮薑八分煎熱沖童便服之以治暈此方兼得之義庶幾近之至於厥症在分娩之後因産時用力過多勞倦傷脾孤臟不能注於四傍故手足逆冷而發厥經云陽氣衰於下則為寒厥厥氣上行滿脈去形蓋逆氣上滿於經絡則神氣浮越去身而散也宜大補回陽生化湯連用二服俟氣血旺而神復厥症自止矣又非偏補血分之可得而愈也若服藥而口渴另用參麥散以代茶助津以救臟燥也又有四肢逆冷泄痢類傷寒陰症不可用四逆湯必生化湯倍參煎服或加熟附子一片則可以止逆回陽而見參歸之功矣若血塊痛止而厥滋榮益氣湯最效凡暈厥乃産後危急二症若新産塊痛未除又未可遽加耆術故急加人參從權以救之俟暈止厥回再去參以除塊痛此要訣也從權急救生化湯治三等血暈兼化瘀生新川芎三錢當歸六錢或八錢酒洗乾薑四分炙黑桃仁十粒去皮尖炙草五分荊芥穗四分炒黑汗多忌用棗二枚水煎服勞倦甚及血崩或汗多形氣脫而暈加人參三錢肉桂四分急服一二帖其效如神決不可疑參為補而緩之從權急救加參生化湯治産後形色脫暈人參三錢川芎二錢當歸四錢酒洗乾薑四分炙黑桃仁十粒去皮尖炙草五分荊芥四分炒黑汗多忌用棗二枚水煎服血塊痛甚加肉桂七分汗多加麻黃根一錢如無塊痛加蜜炙黃耆一錢以止汗加參生化湯附大補回陽生化湯人參二錢川芎四錢當歸八錢酒洗乾薑四分炙黑炙草五分桃仁十粒去皮尖棗二枚水煎服此方産後諸危急症通用一日夜須服三四帖方能接絶之氣如産後三日內塊痛未除俟元氣稍復已有生意當去參仍服生化原方虛脫厥逆汗多加人參三四錢脈與形俱脫將絶必用此方頻灌汗多身熱氣短加人參左尺脈弱亦加人參汗不止三四劑後加蜜炙黃耆一錢一方川芎當歸減半名大補回陽生化湯治新産厥症棗引速煎二服即效若厥症作渴佐以生脈五味飲代茶以救津液則渴減厥回滋榮益氣湯治血塊痛止而厥人參當歸各二錢川芎白朮土炒黃耆蜜炙各錢半或一錢熟地二錢麥冬八分或一錢去心炙草四分五味子十粒川附子五六分或一錢制水煎服汗多加麻黃根炒棗仁各一錢血脫氣脫神脫三症論産後暴崩為血脫氣短似喘為氣脫妄言妄見為神脫三症雖有氣陽血陰之分於精散神促無異比前暈症治可少緩亦危症也若非大藥急方頻服失之者多矣倘誤為氣實痰火妄治鮮有不殞生者若勢急並宜用加參生化湯補中寓行免致血虛之失其血脫患崩一症由衝任已傷氣血未復或因勞役驚恐或因惡露未盡固澀太速以致停留一旦復行然經血大來當審血氣而辨血色之紅紫視形色之虛實如血多紫色有塊乃當去之敗血也其少腹必脹滿按之而痛止之反能作痛或致淋瀝此不可言崩只服生化湯幾帖自愈如鮮紅之血大來乃驚傷心不能主血怒傷肝不能藏血勞傷脾不能統血血不歸經血臟有傷當以崩症治之崩非經病産婦得之是為重虛猶不可忽故宜急治用荊芷治崩湯若有血塊痛而形色脫或有汗或氣促宜服加參生化止崩湯以益氣使陽生而陰血自旺非十灰散之可止者如血塊痛止或産後半月外崩症者又宜滋榮益氣止崩湯或升舉大補湯少佐黃連墜火寧血歸經或用曾生升舉大補湯亦妙亦有小腹空痛不可誤認有瘀察其下血少而無紫塊者是也當以崩治宜重用熟地若小腹滿痛不已而脈實大緊數者此肝經已竭肝氣隨敗矣難治醫通有治産後崩中去血赤白相兼或如豆汁用千金伏龍肝湯治之其氣脫短氣似喘一症因産所下過多榮血暴竭衛氣不能運行獨聚於肺肝腎不接故令呼吸短促語言不相接續有似於喘實非喘也夫肺受脾氣散精生脈而通水道呼吸所以清肅上下調和榮衛而為平人若值産後血亡氣窮浮脫於上孤陽絶陰無根將脫之兆最為危候惟大進參附或可得生世有妄論痰火實症反用散氣化痰之方治之必死有塊痛者當用大補回陽生化湯連二三服世人多疑參助喘不用致不救者多矣況同芎歸黑薑不知耆術萬無有失要知人生於氣氣壯則根本固而藏源者斂納於下運行者強健於中何有為喘為脹之虞考全書貞元飲亦治似喘妙藥也如無塊痛當用續氣養榮湯最妙或倍參補中益氣湯少佐熟附助參以治氣脫攝氣歸元亦可如氣虛兼寒者宜大補元煎或理陰煎主之其神脫妄言妄見一症因心肝脾三陰血少而神魂無依也然有譫語鄭聲之分甚至發狂等症統歸於妄耳其輕者睡中呢喃重者不睡亦語或言日用尋常之事或如見鬼狀昏不識人語言不休此譫語之謂也若虛甚而聲轉無力言語不能接續有頭無尾一兩句即止或重言疊語説過又説或如造字出於喉中若鄭聲之輕怯此鄭聲之謂其精氣衰奪更甚於譫語矣若夫産後氣血暴竭而心神失守故語言無倫肝魂無依則瞳眊妄見況心為五臟之主目乃百脈之官虛症見於心目則十二官各失其職可知矣是以視聽言動皆成虛妄當論産期塊痛有無先後施治方為得法若分娩兒下之後塊痛未止者宜服寧神生化湯確知瘀血不行合失笑散同服如痛止者則服寧心定魄茯神湯連進大補十數劑生氣養血安神定志服至元足其病始愈矣或以生地易熟地而清心火寧君主之官亦可荊芷治崩湯治産後血崩其色鮮紅川芎一錢歸身四錢乾薑二分炙黑荊芥穗六分炒黑炙草四分白芷五分棗煎服加參生化止崩湯治産後血塊痛鮮血崩形色脫或汗多或氣促人參二三錢歸身四錢川芎二錢乾薑炒黑炙草各四分白芷荊芥穗炒黑各五分桃仁十粒滋榮益氣止崩湯治産後無塊痛或半月外崩症人參川芎黃耆蜜炙各一錢白朮土炒生地各二錢當歸四錢酒洗陳皮黃連白芷荊芥炒升麻炙草各四分棗二枚水煎入童便溫服驚悸加柏子仁一錢炒棗仁一錢身熱倍加參耆去黃連升舉大補湯治産後日久血崩不止或崩如雞蛋大或去血片宜大補脾胃升舉氣血少加鎮墜心火之劑並治老壯婦人崩淋人參二錢黃耆一錢蜜炙熟地二錢白朮土炒當歸酒洗各二三錢防風三分荊芥炒黑羌活升麻白芷陳皮黃連炒黃柏炒褐色炙草各四分千金伏龍肝湯治勞傷衝任崩中去血赤白相兼或如豆汁臍腹冷痛口乾食少伏龍肝如彈子大七枚生薑生地各一兩五錢甘草艾葉赤石脂桂心各六錢分四服日三夜一寧神生化湯治産後塊痛不止妄言妄見未可用耆術者人參二錢當歸三錢酒洗乾薑炙黑炙草各四分茯神柏子仁川芎各一錢桃仁十粒益智仁八分陳皮三分棗二枚龍眼肉五個水煎服惡露不止論産後惡露不止非如崩症暴下之多也由於産時傷其經血虛損不足不能收攝或惡血不盡則好血難安相併而下日久不止漸成虛勞當大補氣血使舊血得行新血得生不可輕用固澀之劑致敗血聚為癥瘕反成終身之害十全大補湯主之如小腹刺痛者蒲索四物湯主之如産後月餘經血淋瀝不止宜用升陷固血湯全書云因血熱者宜保陰煎清化飲因傷衝任之絡而不止者宜用固陰煎加減用之若肝脾氣虛不能收攝而血不止者宜壽脾煎若氣血俱虛而淡血津津不已者宜大補元煎若怒火傷肝而血不藏者宜薛氏加味四物湯若風熱在肝而血下泄者宜一味防風散以上諸治法與濟陰綱目理同血崩門亦可參看通治蒲索四物湯治産後惡露不止當歸一錢半川芎八分熟地二錢白芍酒炒延胡醋炒各一錢蒲黃七分炒乾薑五分炒黑産後忌芍藥而此方用之審惡露不止四字則産日已久矣故不忌升陷固血湯治産後月餘經血不止陷下者舉之當歸川芎熟地白芷升麻血餘炭各一錢水煎服保陰煎治一切陰虛內熱動血等症生地熟地芍藥各二錢山藥川續斷黃芩黃柏各一錢五分生草一錢水二盅煎七分食遠服如血虛血滯筋骨腫痛者加當歸二三錢如氣滯而痛去熟地加陳皮青皮丹皮香附之屬此方芩連梔柏等類當於産後日久方可用之固陰煎治陰虛滑泄帶濁淋遺及因虛不固此方專主肝腎人參隨宜熟地三五錢山藥二錢炒山萸肉一錢半遠志七分甘草水泡去骨炒用炙草一二錢味子十四粒菟絲子二三錢炒香水二盅煎七分食遠溫服壽脾煎治脾虛不能攝血等症及婦人無火崩淋凡兼嘔惡猶為危候速宜用此救脾則統血歸源矣若再用寒涼胃氣必脫而死人參隨宜一二錢白朮二三錢當歸二錢山藥二錢棗仁一錢半遠志三五分制乾薑一二錢炮黑炙草一錢蓮肉二十粒去心炒水煎服滑脫不禁者加醋炒文蛤一錢下焦虛滑不禁鹿角霜二錢為末攪入藥中服之大補元煎治男婦血氣大壞精神失守危劇等症人參山藥二錢炒熟地二三錢多則用二三兩杜仲二錢鹽水炒斷絲當歸泄瀉者去之枸杞各二三錢山萸肉如畏酸吞酸者去之炙草各一錢水二盅煎七分食遠溫服如元陽不足多寒者加製附子肉桂炮薑之類隨宜用之如血滯者加川芎去山茱萸滑泄者加五味炒故紙之屬薛氏加味四物湯養肝血清肝火熟地當歸各三錢芍藥二錢川芎炒山梔柴胡丹皮各一錢氣喘論凡産後若因風寒外感邪氣入肺而喘急者必氣粗胸脹或多咳嗽自與氣短似喘上下不接者不同治當疏散中兼補為主宜金水六君煎或六君子湯若單以寒邪入肺氣實氣壅而本無虛者宜六安煎或二陳湯加蘇葉之類主之又有瘀血入肺必面黑髮喘與氣短似喘大不相同用二味參蘇飲治之或有氣虛血痰泛上者用六君子調服失笑散亦效惡露不下論凡産後臟腑勞傷氣血虛損或包絡挾於宿冷或當風取涼風冷乘虛而搏於血壅滯不宣積蓄在內故不下也宜溫暖活血則血自行此必小腹脹滿刺痛無時宜用血症黑神散豫每治此症用生化湯倍桃仁調失笑散生新行瘀頻以黑沙糖沖滾湯少滴無灰酒服之如素不飲或恐發暈即不加酒亦可每每獲效又或因脾胃素弱中氣本虛敗血亦少氣乏血阻不能盡下其症乍痛乍止痛亦不甚不可用大黃等藥攻之反增別病加減八珍湯主之或生化湯多服數帖亦效黑神散見前卷譫語門脫汗亡陽及諸汗論産婦分娩既已亡血而又多汗極危症也蓋汗者心之液榮於內為血發於外為汗血液屬陰陰亡陽亦隨之而走故曰脫汗亡陽其用藥與他症不同但血塊作痛耆術未可據加如倦甚濈濈汗出形色又脫速灌加參生化湯倍參以救危急毋拘塊痛矣汗止再去參服之經曰陽氣者精則養神柔則養筋多汗不止必發柔痙氣血俱虛當用十全大補湯不應加附子豫謂無塊痛者當用之此症若服參耆重劑而汗多不止及頭汗出不至腰足難治自汗不止皆由勞傷心神不能鎮守其液治當健脾胃散水穀之精以歸肺益其榮衛而虛血歸源灌溉四傍不使妄行於外而為汗也亦用加參生化湯或麻黃根湯並間用黃耆五味煎湯送六味丸醫通云因外感多汗者黃耆建中湯主之盜汗者睡中汗出醒來即止猶盜賊之瞰人睡而盜之謂之盜汗非自汗可比也此因亡血陰虛陽氣偏盛內經云陽加於陰則發汗治當兼用血分藥品雜病雖用當歸六黃湯然寒而膩膈又不可治産後之盜汗也宜止汗散主之頭汗者或因濕熱或因瘀血當審虛實治之半身汗出昔人用二陳合四物治多不效以血藥助陰閉滯經絡也此屬氣血不充而有寒痰留滯非大補氣血兼行經豁痰不效宜十全大補人參養榮加星半川烏若肥人多加豁痰行氣藥如瘦人乃氣血本枯夭之徵也麻黃根湯治産後虛極自汗不止人參一錢或二錢當歸二錢黃耆一錢半蜜炙麻黃根牡蠣煅麥冬去心浮麥各一錢桂枝五分炙草四分水煎服如無塊痛加土炒白朮一錢熟地三錢手足冷加熟附子一片炮薑四分惡風寒加防風五分黃耆建中湯桂枝一錢白芍二錢炙草七分黃耆一錢半蜜炙膠飴三錢生薑三片棗二枚桂枝湯者和營表藥也倍芍藥加膠飴便能建立中氣故名小建中湯以芍藥之酸斂護營血膠飴之甘培養中土能治風木乘脾寒熱腹痛再更加炙黃耆即黃耆建中湯治虛勞感寒發汗自汗以黃耆實衛氣使營衛臟腑俱和而受益多矣止汗散治産後盜汗人參二錢麻黃根一錢半當歸酒洗熟地各三錢如有塊痛不用黃連五分炒浮麥一錢傷食論産後形體勞倦脾胃俱傷是以新産之後去膏粱遠厚味食粥茹蔬以為調攝更有本不思食而強與之胃雖少納脾難運轉易致食停痞塞甚而傷食發熱切勿誤認為陰虛更有食滯腹痛又勿錯疑為血凝治斯症者體認正實如發熱而飲食調者方可補血若惡食噯酸者食滯之症即當扶元為主補氣養血健脾助胃審傷何物佐以何藥消導則脾氣復而轉輸易滯物行而胃思谷矣如此補消兼治無有不安故善治者治法有先後緩急論症因塊痛有無産後有日數新久能重産虛之本而兼去停積之標攻補如法無不應手而愈故有生化消食湯健脾消食湯之分別施治生化消食湯即生化湯加神麯炒麥芽炒各六分健脾消食湯治産後塊痛已除停食痞塞人參二錢當歸三錢酒洗川芎神麯炒各一錢白朮一錢半土炒山楂砂仁各六分麥芽炙草各五分忿怒氣逆論産後忿怒氣逆胸膈不舒甚而作痛者兼之血塊又痛宜用木香生化湯則自然血塊速化怒氣易散並治而不悖也若輕産而重氣偏用香附烏藥枳殼香砂之類以散氣行塊而元氣反損悶滿疼痛益增非善治産者也木香生化湯治産後塊痛未除日受氣惱至效川芎二錢當歸六錢酒洗乾薑四分炙黑陳皮三分木香二分磨沖服水煎服若怒後傷食與傷食同治審傷何物以何藥消之頭痛論人身之中氣為陽血為陰陰陽和暢斯無病矣夫頭者諸陽之會也産後去血過多陰氣已虧而虛陽失守上湊於頭則令頭痛但補其血則陽氣得縱而頭痛自止間有敗血停留子宮厥陰之位其脈上貫巔頂作巔頂痛者雖有身熱惡寒之候是宜生化湯加減慎不可用羌獨等藥蓋由正陽虧損濁陰得以犯上陷入髓海為脹為痛是非清陽升復則濁陰不降在裡內起之邪為病非若外入之邪可表而愈也況生化湯中芎薑亦能散表邪桃仁亦能逐瘀血是又可兼治再少為因症加入又何用另方施治乎心痛即胃脘痛論人之胃脘居於心下産後或傷寒氣及冷物而作痛當散胃中之冷物生化立效方治之無有不安若獨用熟藥攻寒其痛雖止而血妄行反虛産母況寒者心挾虛而燥熱者必佐陰藥方能制其僭越也至於綿綿而痛當問血塊盡又可揉按而少止是虛當用補劑大抵産後寒食上攻於心則心痛攻於腹則腹痛治心腹之痛大約相同馮氏云産後陰血虧隨火上衝心絡名下心胞絡痛宜歸脾湯主之醫通用理中加當歸治之生化立效方治産後因傷冷物胃脘作痛川芎二錢當歸四錢桃仁十粒乾薑炙黑炙草各五分肉桂吳萸各四分腹痛論産後腹痛先問血塊如有血塊只服生化湯甚則調失笑散其塊消而痛自止若風冷乘虛入腹或內傷寒涼之物作痛得人按摩略止或熱物尉之略止宜加味生化湯密齋用當歸建中湯治之馮氏云産後惡露或因外感六淫內傷七情致令斬然而止瘀血壅滯所下不盡故令腹痛當審因治之如産後數朝內飲食如常忽作腹痛六脈沉伏四肢厥冷此惡血不盡傷食裹血而脈不起也不可誤認氣血兩虛而用大補須兼消導血行之藥但産後惡露不盡留滯作痛亦常有之然與虛痛不同必其由漸而甚或大小便不行或小腹硬實作脹痛極不可近手或自下上衝心腹或痛極牙關緊急有此實症當速去之近上者宜失笑散近下者宜通瘀煎未效用決津煎為善又有腹痛定於一邊及小腹者此是側臥敗血留滯所致亦用決津煎為當也金匱云産後腹中㽱痛當歸生薑羊肉湯主之蓋㽱痛者緩緩痛也屬客寒相阻故以當歸通血分之滯生薑行氣分之寒君以羊肉者所謂形不足補之以味況羊肉又能補氣㽱痛屬氣弱故宜之若婦人産當寒月寒氣入産門臍下脹痛手不可犯此寒疝也亦宜當歸生薑羊肉湯治之又有産後脾虛腎虛而為腹痛者此不由産而由臟氣不足若脾氣虛寒為嘔吐為食少而兼腹痛者宜五君子煎及六君子湯若腎氣虛寒為瀉為痢而兼腹痛者宜胃關煎或理陰煎主之若胸膈飽悶或惡食吞酸腹痛手不可按此飲食所傷治法見傷食門若食既消而仍痛按之不痛更加頭痛煩熱作渴惡寒欲嘔等症此是中氣被傷宜溫補脾胃為主若發熱腹痛按之痛甚不惡食吞酸此是瘀血停滯失笑散消之若止發熱頭痛腹痛按之卻不痛此是血虛初産生化湯日久用四物加炮薑參術以補之加味生化湯治産後風冷或傷寒物腹痛川芎二錢當歸四錢炮薑四分桃仁十粒炙草五分桂枝四五分當歸建中湯治風冷乘虛入腹或傷寒冷物腹痛當歸酒洗白芍酒炒桂心炙草各二錢薑五片棗三枚入飴糖三匙攪勻服金匱當歸生薑羊肉湯治産後腹中㽱痛及寒月生産寒氣入於子門手不可犯臍下脹滿並治寒疝虛勞不足及脅痛裡急當歸一兩生薑一兩半羊肉二斤生取羊肉清湯煎藥溫分三服小腹痛並兒枕論産後寒中感寒及飲食冷物下攻小腹作痛前已論之矣又有因血虛痛及小腹者亦服生化湯妙至血塊作痛俗名兒枕痛者亦用生化湯不應用延胡生化湯均可密齋云臍下胞胎所繫之處血之所聚也産後血去不盡即成小腹痛症刺痛無時痛則有形須臾痛止又不見形血症黑神散主之然有産婦小腹作痛服行氣破血藥不效其脈洪數此瘀血內潰為膿也是因營衛不調瘀血停滯宜急治之緩則腐化為膿最難治療若流注關節則患骨疽失治多為敗症脈數而洪已有膿遲緊乃瘀血也下之愈延胡生化湯即生化湯加延胡一錢治小腹兒枕塊痛如無塊但小腹痛可按而止者屬虛以生化湯加入延胡索散再加入熟地二錢延胡索散肉桂延胡各等分合為細末聽用腰痛論産後腰痛者由腎位系胞腰為腎腑産則勞傷腎氣損動胞絡或虛未平復而風冷乘之者皆致腰痛若寒冷邪氣連滯背脊痛久未已後忽有孕必致損動宜養榮壯腎湯主之如産後日久腰痛濟陰大造丸治之如惡露方行忽斷絶不來腰中重痛下注兩股痛如錐刺入骨此血滯經絡不即通之必作癰疽醫通用調經散加陵鯉甲或琥珀地黃丸養榮壯腎湯治産後腰痛屬勞傷或風寒所來當歸二錢獨活桂心川芎杜仲鹽水制斷絲續斷肉制桑寄生各八分真防風四分生薑三片煎服如服二帖後疼痛不止腎虛也加熟地三錢再服局方調經散治産後敗血乘虛停積於五臟循經入於四肢留滯日深腐壞如水漸至身體面目浮腫或因産敗血上干於心心不受觸致心煩躁臥起不安如見鬼神言語顛倒並宜服之赤芍沒藥別研琥珀別研桂心當歸各一錢細辛去苗麝香別研各五分上為末和勻每服一錢溫酒入生薑少許服一方每服五分以痛止為度琥珀地黃丸治産後惡露未淨胸腹痛小便不利琥珀別研延胡同糯米炒去米當歸各一兩蒲黃四兩生半炒半乾生地八兩生薑一斤上將地黃咀碎酒浸生薑切片各搗取汁留滓無油杓中用薑汁炒地黃滓地黃汁炒薑滓各干為末忌犯鐵器煉白蜜為丸彈子大每服一丸空心當歸煎湯調服脅肋痛論産後脅痛乃敗血流入肝經其厥陰之脈循行脅肋故作痛此症有虛實宜分治之不可誤也如脅下脹手不可按是瘀血也宜去其血芎歸瀉肝湯主之如脅下痛喜人按其人閃動肋骨狀若奔豚者此去血大多肝臟虛也當歸地黃湯主之尊生云肋痛屬氣滯歸芍清肝飲治之芎歸瀉肝湯治産後瘀血脅痛手不可按歸尾一錢川芎香附童便制各八分青皮枳殼麥炒各六分桃仁八粒去皮尖紅花四五分入童便酒當歸地黃湯治産後肝血去多脅虛而痛人參當歸酒洗白芍酒炒熟地各一錢半陳皮炙草桂心各一錢薑棗引歸芍清肝湯治産後氣滯肋痛當歸一錢半白芍桔梗各六分檳榔枳殼麥炒各三分桂心青木香柴胡各二分五釐手足身痛論産後遍身疼痛者因産百節開張血脈流散氣弱不充則經絡間血多凝滯不散筋脈急引骨節不利故有腰背不能轉側手足不能伸屈或身熱頭痛者起痛散主之若誤作傷寒發表汗出則筋脈瞤動手足厥冷變為痙證又當十全大補湯也若指節疼痛補中益腎湯足膝腫或痛獨活寄生湯醫通云産後手足身痛是血虛不能榮也手足走痛者是氣血不能榮養四末而濁氣流於四肢則腫陰火遊行四旁則痛也不出養榮加黑薑主之起痛散治産後遍身疼痛由氣血虛有滯不可誤作傷寒施治當歸二錢酒浸黃耆一錢蜜炙白朮土炒淮牛膝蒸獨活肉桂韭白各八分甘草三分補中益腎湯專治産後虛勞指節疼痛頭疼汗出人參蜜炙黃耆淡豆豉各一錢當歸二錢酒浸韭白五分生薑三片豬腎一付先將豬腎煎熟取汁二盞煎藥八分溫服發熱論産後七日內外發熱其證多端除傷食發熱已論見傷食門矣然又有發熱惡寒頭痛似太陽症或寒熱頭痛脅痛似少陽症皆由氣血兩虛陰陽不和其狀頗類傷寒治者慎勿偏執蓋産後大血空虛一經發汗重則亡陽輕則筋惕肉瞤或鬱冒昏迷或搐搦便祕變症百出矣雖明知感有外邪其生化湯內芎薑亦能散之否則辛散生化湯亦可何用發表以犯不可汗之禁乎産時傷力發熱去血過多發熱惡露不快發熱三日蒸乳發熱早於起床勞動發熱多因血虛陽無所依浮散於外而為熱只服生化湯二三劑去惡生新陽生陰長其諸熱悉能退之尊生用丹溪法以四君子湯加芎歸黃耆炮薑治産後發熱亦甘溫除大熱意也辛散生化湯治産後感冒風寒惡寒發熱頭痛川芎一錢半當歸三錢炙草乾薑炙黑羌活防風各四分桃仁十粒去皮尖大便燥祕論産後大便燥祕由於去血過多胃中枯燥精微不及下輸以至糟粕壅滯不通況大腸主津産婦內亡津液則乾涸失其傳導變化之權故令便難多服生化湯則血旺氣順自潤而通或服養正通幽湯亦可倘不大便而無所苦即勿藥亦可即有似傷寒三陰症潮熱汗出或口燥腹滿或譫語便祕燥糞宜下等症乃氣血枯竭虛證類實慎勿妄議三承氣湯以下之馮氏云大便難惟宜調中養血切不可單用麻仁枳殼徒耗腸胃中生養之氣而無功也有治大便日久不通大料芎歸服至斤效方得取效仍兼服潤腸粥如大小便俱祕惡露不行方論俱見惡露不下門養正通幽湯治産後大便燥祕川芎一錢或一錢半或二錢當歸四錢或六錢桃仁十粒去皮尖炙草五分陳皮四分麻仁一錢半炒肉蓯蓉一錢或二錢酒洗去泥甲水煎服如有血塊痛加肉桂炒延胡各五分去蓯蓉類瘧及寒熱往來論産後痁瘧在初産時絶少即胎前久瘧淹纏産後裡氣通達無不霍然即有半月內外寒熱往來每日應期而發或一日二三度其症類瘧皆由産後氣血虛損陽虛作寒陰虛發熱或晝輕夜重或日晡發熱或有汗或頭有汗而不及身足此乃元氣虛弱孤陽絶陰之症俱宜滋榮益氣扶正湯間服六味丸以退寒熱如寒熱往來頭痛無汗加減養胃湯治之若寒熱已久無汗者兼煎參朮膏以助養胃湯藥力慎不可作瘧治而用柴胡湯及芩連梔柏以退熱草果檳常以絶瘧而誤人也至於陰陽不和乍寒乍熱參歸湯治之全書云陰勝寒多理陰煎陽勝熱多三陰煎陽氣陷入陰中補陰益氣煎陰陽俱虛八珍十全敗血不散流入陰中而作寒熱決陰煎殿胞煎滋榮益氣扶正湯治産後寒熱往來有汗每午後應期而發人參熟地各二錢川芎黃耆蜜炙麥冬去心各一錢當歸三錢白朮錢半土炒陳皮四分炙草五分加減養胃湯治産後以及一月類瘧並治寒熱往來頭痛無汗人參錢半川芎茯苓蒼朮米泔水制炒各一錢當歸三錢酒浸藿香炙草四分橘紅四分制夏八分薑一片棗三枚參歸湯治産後陰陽不和乍寒乍熱當歸酒洗炮薑一錢人參白芍炒川芎炙草各八分理陰煎熟地當歸乾薑炙草三陰煎治肝脾虛損精血不足及營虛失血等病凡中風血不養筋及瘧症汗多邪散而寒熱猶不止者人參當歸二三錢熟地三五錢酒炒芍藥棗仁各二錢炙草一錢補陰益氣煎人參一二錢當歸山藥酒炒各二三錢熟地三五錢陳皮炙草各一錢升麻三五分若火浮於上者去此不用柴胡一二錢如無外邪不用薑三片煎服此補中益氣湯之變方治勞倦傷陰精不化氣陰虛外感痎瘧並便結不通凡屬陰氣不足而虛邪外侵者用此升散無不神效類中風痙痓及語澀口噤不語筋攣瘈瘲等症論凡婦人衝脈為血脈之海若血脈充足流暢無滯則關節清利而無病矣至於産後勞損臟腑氣血暴竭百骸少血濡養多有陰虛內熱熱極生風雖外症如風實內臟陰血不足氣無所主卒爾口噤牙緊唇青肉冷汗出或唇口喎斜手足筋脈攣搐諸症類於中風者或因血氣耗損腠理不密汗出過多神無所主致角弓反張此乃厥陰虛極類痙痓者在傷寒之家雖有剛柔之分而産後無非血燥血枯之症總宜養陰補血血長而虛風自滅任其痰火乘虛泛上皆當以末治之毋執偏門而用治風消痰之方以重虛産婦也治初産當服生化湯以生旺新血如見危症三帖後即用人參益氣以救之如有痰有火或少佐橘紅竹瀝薑汁其黃芩連柏不可並用膽星蘇子尤不宜加慎之慎之如産已數日腹無塊痛即用滋榮活絡湯如語澀四肢不利宜天麻湯密齋治語言蹇澀加味生脈散治汗多口噤背反氣微類痓用止汗生血飲治無汗筋攣用芎歸棗仁湯諸書所用悉皆參附十全理陰大補元煎之類溫養而峻補之從來未有以風痰治者昔立齋用十全大補治口噤挖開口灌之如不得下令側其面出之仍灌熱者又冷又灌數次即能下而蘇矣醫通云口噤則抉齒灌之齒噤則落入鼻中即蘇此古人救急灌法不可不知至於治口噤不能為語峻補之中少兼通心氣之藥治之故密齋尊生俱用七珍散以通心氣也馮氏治産後瘈瘲用八珍加丹皮鉤藤以生陰血不應用四君子芎歸丹皮鉤藤補脾土蓋血生於至陰至陰者脾土也且氣有生血之功耳再此證如傷寒誤汗亡液誤下亡陰潰瘍膿血大下之後小兒吐瀉之後悉多患之故在産後亦惟去血過多或大汗大瀉而然其為元氣虧極血液枯敗可知若肢體惡寒脈微細者此為正狀若脈浮大發熱煩渴此為假象惟當固本為善若至於無力抽搐戴眼反折汗出如珠兩手撮空者不治尊生治産久拘攣不宜補者用舒筋湯治之滋榮活絡湯治産後口噤項強筋搐類中風證人參二錢或三錢川芎茯神各一錢當歸三錢酒浸黃耆一二錢蜜炙麥冬一錢二分或一錢天麻八分或一錢熟地二錢陳皮荊芥防風羌活炙草各四分黃連三分薑汁炒天麻湯治産後中風恍惚語澀四肢不利人參棗仁炒茯神遠志肉制山藥柏子仁麥冬各一錢當歸一二錢石菖蒲半夏曲南星曲各八分川芎羌活各七分天麻防風各五分細辛四分加味生脈散治産後去血太多心血虛弱不能上榮於舌語言蹇澀人參麥冬歸身生地炙草石菖蒲各一錢五味子十三粒捶碎豶豬心一個劈開水二盞煎至一盞半去心入藥煎七分此方治怔忡甚效止汗生血飲治産後汗出多而口噤背強而直氣息欲絶類痓症宜速治當歸二錢酒浸川芎麻黃根各一錢桂枝羌活防風羚羊角天麻各六分附子制炙草各四分水煎服芎歸棗仁湯治産後無汗筋脈拘攣類痓證當歸二錢酒洗川芎防風各一錢棗仁五分去殼炒用一方有羌活七分七珍散治産後敗血停積閉於心竅神志不明蓋心氣通於舌心氣閉則舌強不語人參石菖蒲各一錢為散各一兩川芎一錢為散七錢五分生地一錢為散易炙甘草三錢細辛二分為散二錢半薄荷一分為散無此味防風五分辰砂五分研細水飛為散三錢尊生合生化湯服舒筋湯羌活薑黃炙草各二錢海桐皮當歸赤芍各一錢白朮一錢土炒沉香少許泄瀉及完穀不化並遺屎論産後泄瀉不可與雜症同治大率中氣虛弱傳化失職所致氣虛食積與濕也氣虛宜補食積宜消濕宜燥之然惡露未除又難以驟補峻消急燥當先用蓮子生化湯三劑化舊生新方中且有蓮子茯苓補脾利水兼治其瀉候舊化新生然後用健脾利水生化湯或補氣或消食或化積或燥濕分利因證加入對證之藥始無滯澀虛虛之失至産後旬日外方可與雜症同論然猶宜量人虛實而治也如痛下清水腸鳴米飲不化者以寒瀉溫之如糞色黃肛門痛以熱瀉清之如飲食過多傷脾噯氣味如敗卵以食積消之如飲食減少食下腹鳴腹急盡下所食之物方覺暢快以脾虛食積補而消之丹溪云如産後虛瀉眼昏不識人危證用參苓朮附湯救之又有胎前久瀉産後不止以致虛脫須從權服參苓生化湯以扶虛仍分塊痛不痛加減而治凡瀉兼熱切勿用芩連梔柏兼痰切勿用半夏生薑如瀉渴參麥飲以回津液如産後脾瀉不止參苓蓮子飲妙夫完穀不化者因産時勞倦傷脾而轉輸稽遲也夫水穀入胃遊溢精氣散歸於脾脾氣散精上歸於肺而調通水道乃能致氣滋臟以養人今因産勞倦脾傷以致沖和之氣不能化而物完出焉病名餐泄又飲食太過脾胃受傷亦致完穀不化俗呼為水穀痢也然産方三日內血塊未散患此脾敗胃弱之症未可遽加耆術且服加味生化湯內有益智砂仁少溫其氣俟塊消散服參苓大補生化湯如胃氣虛瀉利黃色用補中益氣湯加木香治之若久瀉痢虛者參香散如久瀉元氣下陷大便不禁肛門如脫宜加味六君子湯若見完穀不化色白如糜此脾胃大虛元氣虛脫之候十有九死惟猛進溫補之劑庶可挽回即有煩躁發熱面赤脈來數大皆虛火上炎之故當並進桂附人參甘草乾薑苓術之類伏龍肝煎湯代水煎服仍得收功若小便混濁如泔或大便中有白沫如腸垢者乃元氣下陷之故並宜補中益氣加桂苓炮薑升舉之或瀉臭水不止加蘄艾香附吳茱萸若兼瘀結不通腹脹喘急雖神丹亦無濟也如大便不知為遺屎補中益氣湯加肉蓯蓉故紙蓮子生化湯治産後血塊未消泄瀉川芎茯苓各二錢當歸四錢一方一錢黃土炒炮薑四分桃仁十粒炙草五分蓮子十枚去心健脾利水生化湯川芎當歸黃土炒各一錢白朮二錢土炒澤瀉八分炮薑四分陳皮炙草各五分肉果一枚煨人參三錢茯苓一錢五分瀉水多而腹不痛者有濕加製蒼朮一錢以燥之諸瀉方中須加蓮子十枚參苓朮附湯丹溪治産後虛瀉眼昏不識人危症用此方救之人參七錢白朮三錢土炒茯苓製附子各一錢參苓生化湯治胎前久瀉産後不止人參當歸各二錢炮薑炙草各五分訶子皮川芎山藥炒各一錢肉果麥煨茯苓一錢五分蓮子七枚糯米一大撮參茯蓮子飲治産後脾泄不止並治年久不止脾泄之症忌勞力恐火動復瀉人參白朮土炒各二錢白芍八分炒當歸一錢半白茯苓山藥各一錢升麻陳皮三分炙草四分蓮子十二粒去心薑二片水三盅煎服取藥內蓮子送藥加味生化湯治産後脾虛三日內血塊未消完穀不化胎前素弱者非胃苓能治此方主之川芎益智仁砂仁各一錢當歸四錢土炒炮薑四分炙草五分茯苓一錢五分桃仁十粒去皮尖參苓大補生化湯治産後血塊痛止可服此以補之完穀自化矣人參白朮土炒各二錢川芎當歸益智仁白芍炒茯苓各一錢炮薑四分肉果一個麥煨炙草五分蓮子八粒去心痢滯論凡雜症之痢皆由暑濕之積邪或挾食積所致傷於氣分則痢白傷於血分則痢赤氣血俱傷赤白兼下至産後患此則有不同治法亦異蓋多有中氣虛而停積也如産後七日內外患赤白痢疾後重頻並最為難治欲調氣行血而推蕩痢邪猶慮産後之元氣方虛欲滋榮益氣而大補産虛又恐反助痢初之邪盛其行不損元補不助邪惟生化湯去乾薑加以木香茯苓名香苓生化湯為善以其能消惡露兼行痢滯也如痢在七日之外可酌加芍連蓮朴等藥如傷麵食穀食瀉痢先服生化湯加炒神麯塊痛止服六君子加麥芽一撮或神麯一錢如傷肉食瀉痢先服生化湯加山楂砂仁塊痛止服六君子湯加山楂四五枚砂仁四分炒神麯一錢如半月外患赤痢後重歸芍連殼飲如脾氣虛弱瀉痢四肢浮腫宜六君子湯加木香肉果麵煨合五皮散如瀉痢黃色乃脾土正氣虛耳宜補中益氣湯加木香四分肉果一枚煨如胃氣虛弱瀉痢完穀不化當溫助胃氣及産後瀉痢日久後重者並宜服加味六君子湯大凡産後赤痢去血多薑砂木香之類不可多用熱則血愈行倘血痢日久不止者血虛也宜四物湯加荊芥人參凡諸症兼嘔吐皆宜加藿香五分痰加製半夏八分兼小便短澀引加燈心三十寸且燈心利水而不傷陰況産後津液已虧兼之瀉痢傷陰復傷津液小便理宜短少故止用燈心足矣不可用利水傷陰之藥也如胎前下痢産後不止伏龍肝湯丸治之又有白頭翁加甘草阿膠湯治産後痢不止馮氏云産後腹痛瀉痢若非外因所傷乃屬腎氣虧損陽虛不能生土陰虛不能閉藏耳必用四神八味補腎倘誤投分利導水之劑是益其虛但瀉痢之症非脾即腎如病在腎所謂補脾不如補腎如病在脾自又補腎不如補脾也香苓生化湯治産後七日內患赤白痢川芎二錢當歸五錢炙草五分桃仁十粒茯苓一錢陳皮四分木香一分歸芍連殼飲治産後半月外患赤痢後重川芎一錢半當歸三錢白芍酒炒茯苓各一錢黃連六分薑汁炒枳殼五分麥炒甘草四分木香三分五皮散治産後風濕傷脾氣血凝滯以致面目虛浮四肢腫脹氣喘陳皮桑皮薑皮茯苓皮大腹皮黑豆水制淨各一錢伏龍肝湯丸治胎前下痢産後不止及元氣大虛瘀積小腹結痛不勝攻擊者山楂肉一兩炮黑黑糖二兩熬枯二味一半為丸一半為末用伏龍肝二兩煎湯代水煎前末二錢送前丸二錢日三夜二服一晝夜令盡氣虛加人參二三錢駕馭之虛熱加炮薑肉桂茯苓炙甘草兼感風寒加蔥白香豉膈氣不舒磨沉香數匙調服腹脹滿悶論産後有因敗血流入於脾胃腹脹嘔吐者已於嘔吐門中論之矣然婦人因産脾胃多虛飲食最易停滯而生脹悶若産畢隨服生化湯消其舊瘀而生其新血瘀塊既消便大補氣血使脾胃健運自無中虛脹滿之證其産後大率因傷食而誤用消導因氣鬱而誤專順氣或因多食冷物而停滯惡露或因血虛大便燥結誤下而愈脹此蓋止知傷食當消氣鬱當順惡露當攻便結當下不知消耗愈多胃氣大損滿悶益增氣不升降積鬱之久兼成臌脹若再專用攻消不死不休矣豈知消導佐於補劑內則脾強而所傷之食消氣散逐瘀佐以養血劑中則惡露自行而大便濡潤亦通祕書立有治脹方並養生化滯湯二方治産後脹症均未敢專於消導前人之慮産深矣醫通云胎前孕婦服安胎藥過多或正産半産後經一兩月惡露未淨此非敗血之比宜導氣行血若用止截誤矣又云飽悶惡露不行多因血逆宜行瘀為主如有塊上升飽悶欲吐者二陳湯加薑桂香附炮楂蓬朮塊不散積久愈堅琥珀黑龍丹豫謂審知飽悶實因惡露不行所致若初産仍宜服生化湯瘀去而飽悶自開可無藉乎二陳炮楂蓬朮恐産虛者難當耳治脹方治産後腹脹人參二錢白朮土炒當歸各三錢茯苓一錢半川芎七分陳皮四分甘草三分養生化滯湯治産後大便不通誤服大黃等藥致成膨脹人參茯苓川芎白芍炒各一錢當歸四錢桃仁十粒肉蓯蓉一錢半酒洗去泥甲大腹皮五分黑豆水制淨陳皮四分制香附炙草各三分浮腫論産後手足俱浮皮膚間光瑩色潤乃脾虛不能制水腎虛不能行水也宜大補為主補中利水湯治之如因寒邪濕氣傷表無汗而腫前湯加薑皮半夏蘇葉或五皮散亦可又有由敗血乘虛停積而循經流入四肢留淫日深腐壞如水故令面目四肢浮腫乍寒乍熱醫人不識誤作水氣治之多用導水凡治水藥極能虛人産後既虛藥又虛之是謂重虛多致夭枉如産畢隨服生化湯化瘀生新自無此敗血如水之症今既失治宜服小調經散則血行腫消密齋用調經湯又加味五皮湯使氣血流行風濕消散腫自消矣若水氣系肺失降下之令其人必發咳嗽小便澀少可立而辨也如腳腫或肚肺或成臌腫宜濟生腎氣丸馮氏云産後浮腫若寒水侮土宜養脾肺若氣虛浮腫宜蓋脾胃若水氣浮腫宜補中湯若兼喘咳而脈沉細無力此命門火衰脾土虛寒也八味丸主之腹滿者氣虛而非血也補中湯送八味丸一以升補清陽一以斂納濁氣升降既得而脹滿自消矣補中利水湯治産後七日外消腫利水人參白朮土炒各二錢茯苓白芍炒各一錢木瓜八分陳皮五分紫蘇製蒼朮木通大腹皮黑豆水淨制厚朴薑汁製各四分如壅滿用製半夏陳皮制香附監之小調經散治産後浮腫因敗血者歸身酒洗赤芍桂心各一錢沒藥琥珀各一分麝香細辛各五釐炙草二分為末每服五分薑汁酒調下調經湯歸身酒洗赤芍丹皮桂心赤茯苓陳皮炙草各一錢細辛炮薑各五分加味五皮湯治産後虛弱腠理不密調理失宜外受風濕面目四肢浮腫者桑白皮陳皮茯苓皮大腹皮生薑皮各一錢漢防己枳殼豬苓各八分炙草五分淋症論産後淋症此亦血去陰虛生內熱也蓋腎為至陰主行水道去血過多正陰虧損故生內熱小便成淋而澀痛是以熱客於脬虛則頻數熱則澀痛也氣血兼熱血入胞中則血隨小便而為血淋但小便淋閉卻與不通當分別而治不通者屬氣虛淋屬內熱澀痛故密齋治淋用知柏導赤散調益元散治之馮氏云血虛熱鬱當用六味丸逍遙散補陰養血滋其化源佐以導血藥可也知柏導赤散生地赤芍木通麥冬去心黃柏知母炒桂心甘草各一錢燈心四十九寸大小便血論産後尿血小腹痛者乃敗血流入膀胱小腹不痛但溺時澀痛者乃內熱也並用小薊湯主之尊生用加味腎氣去桂附加生地發灰治之至於大便便血或因飲食起居失宜或因六淫七情過極致元氣虧損陰絡受傷也四君子加生地升麻歸身白芍發灰治之小薊湯小薊根生地赤芍木通蒲黃淡竹葉甘草梢各一錢滑石二錢燈心引咳嗽論産後七日內外感風寒咳嗽鼻塞聲重惡寒者只服生化湯自愈內有芎薑散其邪也或於生化湯中加杏仁桔梗有痰加天花粉又有加味生化湯並皆治之總不用麻黃動汗即嗽而脅痛亦不用柴胡伐肝因其內虛耳
